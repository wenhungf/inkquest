    var html =
      '<p>The ninth bolt of tribulation lightning dies in the clouds above you. Smoke rises from your robe. Your hair stands up like an angry cat.</p>' +
      '<p>Three hundred years of cultivation. Nine bolts of heaven\u2019s anger. And you are still standing.</p>' +
      '<p>You won.</p>' +
      '<p>A bright voice speaks inside your head.</p>' +

      '<p>The voice is gone. The sky opens. Light takes you.</p>' +

  e1s2: function () {
    var html =
      '<p>Heat hits you like an open oven.</p>' +
      '<p>You stand in a narrow lane between tall buildings. The air is wet and heavy. Below the noise of a thousand metal beasts, you hear water dripping from white boxes on every wall. Towers of glass climb into the sky. Far above them, a metal bird crosses the clouds without moving its wings.</p>' +
      '<p>\u201cSo this is the immortal realm,\u201d you say to no one.</p>' +
      '<p>It is louder than you expected. And much, much hotter.</p>' +
      '<p>Three hours later \u2014 you do not wish to talk about those three hours \u2014 you stand in front of a paper sign taped to a metal door:</p>' +
      '<p class="beat">ROOM FOR RENT \u00b7 ROOFTOP \u00b7 CHEAP</p>' +
      '<p>You can read it. Ascension opens all tongues to the ascended \u2014 every child in your old sect knew that. What it does not give you is a place to sleep.</p>' +

    return { label: 'Section 2 \u00b7 The Hot Realm', time: 'DAY 1 \u00b7 14:07 \u00b7 TAIPEI', html: html,
      choices: [{ t: 'Knock on the rooftop door.', to: 'e1s3' }] };

  e1s3: function () {
    var html =
      '<p>The landlord is a small woman with fast eyes and a ring of keys. \u201cMrs. Lin,\u201d she says, and that is the whole introduction.</p>' +
      '<p>The room sits on the roof like a metal box that someone forgot. One room. A tin roof. One window with a window screen. A toilet behind a plastic door. An old air conditioner hangs on the wall like a tired animal.</p>' +
      '<p>\u201cIt works when it wants to,\u201d Mrs. Lin says, following your eyes.</p>' +
      '<p>Inside, the heat could roast tea leaves. You once meditated inside a volcano for forty-nine days, so you nod politely.</p>' +
      '<p>\u201cRent is 8,500 a month,\u201d she says. \u201cDeposit is two months. First month up front. You pay today, you sleep here today.\u201d</p>' +
      '<p>You count in your head. 25,500 coins. Half your fortune, gone in one breath.</p>';
    return { label: 'Section 3 \u00b7 The Room on the Roof', time: 'DAY 1 \u00b7 16:40', html: html,
      choices: [
        { t: '\u201cToo expensive. The roof is rust and the screen has a hole.\u201d \u2014 Haggle like a market grandmaster.', to: 'e1s3a',
          fx: function () { state.flags.haggled = true; state.flags.hasFan = true; } },
        { t: '\u201cI will take it.\u201d \u2014 You are rich. Probably.', to: 'e1s3b' },

  e1s3a: function () {
    var html =
      '<p>Three hundred years in a sect teaches you three arts: the sword, the pill fire, and the market war outside the mountain gate, where old women sell herbs and take no prisoners.</p>' +
      '<p>So you haggle. You point at the rust on the roof. You point at the crack above the door. You touch the wall and show her the paint on your finger like evidence of a crime.</p>' +
      '<p>Mrs. Lin fights well. She praises the view. She praises the \u201cnatural air flow,\u201d which is a hole. For six minutes the lane below hears two masters at work.</p>' +
      '<p>\u201cEight thousand,\u201d she says at last. \u201cFinal. And take the fan in the corner. The last tenant left it.\u201d</p>' +
      '<p>An old electric fan stands by the wall, dusty but whole. You bow, very slightly. She nods, very slightly. Respect.</p>';
    return { label: 'Section 3 \u00b7 continued', time: '', html: html,

  e1s3b: function () {

      '<p>\u201cI will take it,\u201d you say.</p>' +
      '<p>Mrs. Lin blinks. Nobody says yes that fast. Not to this room. Not in this heat.</p>' +
      '<p>She looks at you again, head to toe \u2014 the strange old clothes, the calm face, the posture of a man who has stood guard for a century. Rich, she decides. Or strange. Or both. Both make fine tenants.</p>' +
      '<p>\u201cGood,\u201d she says, already pulling papers from her bag. \u201cI like a fast decision. Slow people\u2026\u201d</p>' +

  e1s3c: function () {
    var html =
      '<p>\u201cWhy is it so cheap?\u201d</p>' +
      '<p>Mrs. Lin\u2019s eyes slide to the window. Just for a moment.</p>' +
      '<p>\u201cTop floor is hot,\u201d she says. \u201cRain is loud. Young people have no patience. The last tenant\u2026 left quickly.\u201d</p>' +

  e1s4: function () {
    var paid = state.flags.haggled ? '24,000' : '25,500';
    var html =
      '<p>The contract is two pages. You read every word, because a man who signs without reading deserves what he gets \u2014 your first master taught you that, one hour before he sold you to the sect.</p>' +
      '<p>You sign your name. The pen is light as a feather and the strokes come out like a sword form. Mrs. Lin turns the paper sideways. \u201c\u2026Is that a name?\u201d</p>' +
      '<p>Then you count out ' + paid + ' coins into her hand. The money leaves your fingers one paper at a time. Once, you handed a thousand-year ginseng to your master with less pain than this.</p>' +
      '<p>Mrs. Lin writes you a receipt, folds it twice, and gives the rules: no fire on the roof, no noise after midnight, garbage goes down at seven.</p>' +

  e1s5: function () {
    var fanLine = state.flags.hasFan
      ? '<p>At a bright, cold store the size of a sect hall, you buy what a mortal life needs: a folding mattress, thin summer bedding, slippers, soap, a tower of instant noodles. The fan, at least, is free \u2014 a gift from a war well fought.</p>'
      : '<p>At a bright, cold store the size of a sect hall, you buy what a mortal life needs: a folding mattress, thin summer bedding, slippers, soap, a tower of instant noodles \u2014 and an electric fan, because the room on the roof is an oven with a window.</p>';
    var html =
      '<p>The phone shop glows white like a healer\u2019s hall. A young clerk sells you \u201ca basic one\u201d \u2014 11,900 coins \u2014 and a prepaid card for 488 more.</p>' +
      '<p>You hold the black glass brick in your palm. It is lighter than a low-grade jade slab and ten times the price.</p>' +
      '<p>The screen wakes and asks you to choose an assistant personality. A long list scrolls past. Your finger picks one at random.</p>' +

      '<p>The phone speaks.</p>' +

      '<p>Your hand closes around it. The clerk takes one step back.</p>' +
      '<p><em>That voice.</em></p>' +
      '<p>\u201cSystem?\u201d you whisper. \u201cYou came back? You owe me an exchange rate, you little\u2014\u201d</p>' +

      fanLine +
      '<p>The sun goes down behind the towers. You carry your whole new life up six floors.</p>';

  e1s6: function () {
    var html =
      '<p>Night. The tin roof clicks as it cools, like a slow clock. The heat does not leave; it just sits down and makes itself comfortable.</p>' +
      '<p>You lie on the new mattress and listen to your kingdom. The hum of the city below. Water moving in a pipe inside the wall. Far away, a dog with opinions.</p>' +
      '<p>Then, from the corner: <em>tk\u2026 tk\u2026 tk.</em></p>' +
      '<p>On the wall, in the weak light from the window, a cockroach. Big as a thumb. Its feelers taste the air, slowly, like a gourmet.</p>' +
      '<p>You have killed demon wolves with your palm. You have cut a river in half, once, mostly by accident. But you respect local tradition \u2014 and your qi is precious in this thin-aired realm. You take the slipper.</p>' +
      '<p>First strike: miss. It runs half a meter and stops.</p>' +
      '<p>Second strike: it does not run.</p>' +
      '<p>It turns. It looks at you. Every soul raised on this island knows this pause, and you, a newcomer, are about to learn it.</p>' +
      '<p class="beat">It flies. At your face.</p>' +
      '<p>Your dao heart \u2014 three hundred years old, nine times struck by heaven, never once bent \u2014 cracks like cheap porcelain.</p>' +
      '<p>\u201cENOUGH.\u201d</p>' +
      '<p>You sit. Your hands move through the seals by themselves, the way they have ten thousand times. The textbook form. The one you could cast asleep, upside down, poisoned.</p>' +
      '<div class="cast">\u27e1 Grand Dwelling Ward \u27e1</div>' +
      '<p>Jade light blooms from the floor and closes over you like a quiet sea. The cockroach hits the light mid-flight \u2014 <em>tok</em> \u2014 drops, and walks away with what dignity it has left.</p>' +
      '<p>Silence. Victory.</p>' +
      '<p>For three seconds.</p>';
    return { label: 'Section 6 \u00b7 The First War', time: 'DAY 1 \u00b7 23:58', html: html,
      choices: [{ t: 'Three seconds later.', to: 'e1s7' }] };
  },

  e1s7: function () {
    var html =
      '<p>The lamp above your bed dies.</p>' +
      '<p>The fan at the foot of the mattress stops mid-turn.</p>' +
      '<p>On the floor, Boba\u2019s voice cuts off in the middle of a word.</p>' +
      '<div class="ai">Sir, I detec\u2014</div>' +
      '<p>Dark. Quiet. The heat, which never left, smiles and moves closer.</p>' +
      '<p>You check the ward. The ward is perfect. Of course it is perfect. The Grand Dwelling Ward blocks lightning-type energy. It blocks all divine sense from passing in or out. Standard. Textbook. Page one.</p>' +
      '<p>The textbook never met a lamp that drinks lightning from a wire in the wall. It never met whatever invisible thread feeds a talking brick.</p>' +
      '<p>You test the air. Air still flows through the ward \u2014 air is air in any world. The thin, weak spirit qi of this realm still flows too. Good. You would hate to explain to anyone that you suffocated inside your own masterpiece.</p>' +
      '<p>So you reach for the lightning in the wire, to write one small rule: <em>this may pass.</em> A ward is a list of rules, and the master of the ward writes the list.</p>' +
      '<p class="beat">But to write the rule, you must define the thing. And you reach, and you find\u2026 nothing. Tame lightning? A river of sparks that lives in walls and obeys mortals? You do not know what it is. And a ward cannot hold what its master cannot name.</p>' +
      '<p>Three hundred years of dignity make a small, ugly sound somewhere inside you.</p>' +
      '<p>Then, by your ear: <em>nnnnnnng.</em></p>' +
      '<p>Two thin singers. Two mosquitoes. <em>Inside</em> the ward. You sealed them in \u2014 with the only warm, blood-filled, mortal-smelling dinner on this roof.</p>' +
      '<p>And one more thing, in the weak city light through the window. The screen. The small hole, patched with tape. The tape peeled open like a little door. The hole is old. Someone fought this war before you. Someone patched, and something tore it open again.</p>';
    return { label: 'Section 7 \u00b7 The Dark', time: 'DAY 2 \u00b7 00:01', html: html,
      choices: [
        { t: 'Hold the ward. Hunt them in the dark with your bare hands. You have endured worse. Probably.', to: 'e1s8a',
          fx: function () { state.flags.route = 'a'; } },
        { t: 'Drop the ward. The city outside never sleeps \u2014 somewhere, it sells weapons.', to: 'e1s8b',
          fx: function () { state.flags.route = 'b'; } },
        { t: 'The ward is not wrong. The rules are. Rewrite them. Now.', to: 'e1s8c',
          fx: function () { state.flags.route = 'c'; } }
      ] };
  },

  e1s8a: function () {
    var html =
      '<p>You sit cross-legged in the dark and listen, the way your master taught you to listen for a sword in the fog. No ward, no slipper worth the swing \u2014 only your bare hands. Breath slow. Mind empty. Sweat running down your back like a small, personal river, because the fan is dead and the ward holds the night\u2019s heat in with you.</p>' +
      '<p>The whine comes. Left ear. You strike. You hit your own face.</p>' +
      '<p>The whine returns, right ear, lower, slower \u2014 wiser. Somewhere out there in the dark, half a meter away, your enemy is learning faster than you are.</p>' +
      '<p>The night goes long. You stop counting your misses around the fourth. The heat thickens. The city hums outside your jade wall like a party you were not invited to.</p>' +
      '<p>And then, deep in the smallest hour, your mind finally goes truly quiet \u2014 and the fog-sword lesson works. You hear the wings turn. You clap, once, into the dark.</p>' +
      '<p>Silence. It is the smallest victory of your three hundred years, and one of the most satisfying.</p>' +
      '<p>The second one drinks from your ankle while you celebrate. By dawn your ankle is itchy and your eyes are sand, and you have learned tonight\u2019s lesson, which is bigger than mosquitoes:</p>' +
      '<p class="beat">A ward that seals the world out seals you in. No light. No wind. No talking brick. No city. In this realm, total isolation is not safety. It is losing slowly, in the heat, with one mosquito.</p>';
    return { label: 'Section 8 \u00b7 The Hunter in the Dark', time: 'DAY 2 \u00b7 00:14 \u2014 05:50', html: html,
      choices: [{ t: 'Dawn.', to: 'e1s9' }] };
  },

  e1s8b: function () {
    var html =
      '<p>You release the ward.</p>' +
      '<p>The lamp blinks on. The fan wakes mid-turn, as if nothing happened. On the floor, Boba returns in the middle of the same word.</p>' +
      '<div class="ai">\u2014ting a signal problem. Sir? Did you put me in a tomb?</div>' +
      '<p>\u201cLater,\u201d you say, stepping into your slippers. \u201cWhere does this city sell weapons at this hour?\u201d</p>' +
      '<div class="ai">Define \u201cweapons.\u201d Wait. Don\u2019t. There\u2019s a convenience store two minutes away. It\u2019s open. It\u2019s always open.</div>' +
      '<p>The lane at two in the morning is warm and orange under the street lights. At the corner stands a small temple of light \u2014 glass walls, white glow, cold air pouring from the door like a blessing. A bell chimes twice as you enter, announcing you to no one.</p>' +
      '<p>You walk the shelves like treasure rooms. Cold tea in a hundred bottles. Eggs swimming in dark, fragrant soup. Steamed buns sleeping behind warm glass. A whole realm that never closes its eyes.</p>' +
      '<p>You buy a mosquito coil, and a thing the clerk calls an electric mosquito swatter \u2014 a racket strung with metal wires, 249 coins, hanging next to the chewing gum.</p>' +
      '<p>Outside, in the lane, you press the button on the handle and touch the wires with the tip of a leaf. Blue light snaps between the wires with a crack you know very, very well.</p>' +
      '<p class="beat">Thunderbolt.</p>' +
      '<p>You stand still in the orange lane, holding the racket with both hands now. The mortals of this realm caught the thunderbolt. They tamed it. They taught it to live in walls and lamps and talking bricks \u2014 and they put it in a toy, and they sell it for 249 coins, next to the chewing gum.</p>' +
      '<div class="ai">It\u2019s for mosquitoes, sir. Please don\u2019t bow to it.</div>' +
      '<p>Back on the roof, you light the coil. Thin white smoke draws slow circles in the lamplight. You sleep without the ward, guarded by smoke and tame thunder, the racket resting on your chest like a sword.</p>';
    return { label: 'Section 8 \u00b7 The Pilgrimage', time: 'DAY 2 \u00b7 02:03', html: html,
      choices: [{ t: 'Sleep. Dawn comes fast.', to: 'e1s9',
        fx: function () { state.money -= 337; state.flags.thunder_seed = true; } }] };
  },

  e1s8c: function () {
    var html =
      '<p>You sit in the dark, in the heat, with two mosquitoes singing war songs around your head, and you open the heart of the ward.</p>' +
      '<p>A wall is stupid, your first teacher said. A ward is a list of rules about what may not pass \u2014 and the master writes the list. So write. One new rule: <em>the lightning in the wire may pass.</em></p>' +
      '<p>The ward asks \u2014 not in words, wards have no words \u2014 the only question a ward ever asks: <em>define it.</em></p>' +
      '<p>You reach. Lightning that is not angry? Thunder that lives in a wall? A river of\u2026 of what? You hold nothing. The rule dies unwritten, because you cannot define what you do not understand, and tonight you understand <em>nothing about this world.</em></p>' +
      '<p>Three hundred years of dignity make a small, ugly sound. Then \u2014 wait.</p>' +
      '<p>You cannot name the lightning. Fine. But insects?</p>' +
      '<p><em>Insects you know.</em> Your sect classified the lesser wyrm-kin in nine volumes, and you, in one long boring winter, wrote two of them. Carapace, wing, feeler, six legs or eight or a hundred \u2014 you can define an insect asleep, upside down, poisoned.</p>' +
      '<p>So you stop repairing the great ward. You let it fall \u2014 the lightning-blocks, the divine-sense walls, three hundred years of textbook \u2014 and from the pieces you raise something small, humble, and perfect.</p>' +
      '<p class="beat">One rule. One bed. INSECTS: DENY.</p>' +
      '<p>The lamp blinks on \u2014 the new ward touches no wire. The fan wakes mid-turn. Boba returns in the middle of the same word.</p>' +
      '<div class="ai">\u2014nal lost. Sir? Did we die?</div>' +
      '<p>By your ear: <em>nnn\u2014 tink.</em> A tiny singer bounces off jade light. A pause. Then the second, stubborn: <em>tink.</em></p>' +
      '<p>You lie down inside the strongest mosquito net in two worlds, and you sleep like a sect master.</p>';
    return { label: 'Section 8 \u00b7 The Rewrite', time: 'DAY 2 \u00b7 00:30', html: html,
      choices: [{ t: 'Sleep. You have earned it twice.', to: 'e1s9',
        fx: function () { state.flags.dignity = true; } }] };
  },

  e1s9: function () {
    var opener;
    if (state.flags.route === 'a') {
      opener = '<p>Morning light finds you cross-legged, red-eyed, one mosquito to your name and one ankle on fire. You drop the great ward \u2014 light, wind, and city pour back in like old friends \u2014 and in the grey morning you build the real answer, the one the long night taught you.</p>';
    } else if (state.flags.route === 'b') {
      opener = '<p>You wake at dawn. The coil has burned to a spiral of grey ash. The racket of tame thunder is still on your chest. Good mortal weapons \u2014 but a grandmaster does not borrow forever. You sit up and build the real answer.</p>';
    } else {
      opener = '<p>You wake rested, inside a soft jade glow, to the sound of a city starting its engines. The small ward held all night and drank almost nothing. Now, in the morning light, you refine it one final turn.</p>';
    }
    var html =
      opener +
      '<p>One rule, written clean: <em>insects \u2014 deny.</em> One space, the size of a bed. It touches no wire. It blocks no light, no wind, no voice, no city. It costs so little that the thin qi of this realm can feed it forever.</p>' +
      '<p>Below, the realm wakes up. Metal beasts cough and clear their throats in the lanes. Somewhere downstairs, oil meets dough, and the smell of fried bread climbs six floors without losing strength.</p>' +
      '<p>You inspect your work the way you once inspected a mountain-gate ward before a demon tide: slowly, twice, with your hands behind your back.</p>' +
      '<p>It is a mosquito net.</p>' +
      '<p class="beat">It is the strongest mosquito net in two worlds.</p>' +
      '<p>Three hundred years, nine bolts of heaven, and this is the first thing you have built in the immortal realm. You find, to your own surprise, that you are satisfied. It is small. It is humble. It is <em>good work.</em></p>';
    return { label: 'Section 9 \u00b7 Dawn', time: 'DAY 2 \u00b7 06:12', html: html,
      choices: [{ t: 'Morning report.', to: 'e1s10', fx: function () { state.barrier = 'Mosquito Net \u00b7 Lv.1'; } }] };
  },

  e1s10: function () {
    var money = state.money.toLocaleString('en-US');
    var rent = state.rent.toLocaleString('en-US');
    var ach = [];
    ach.push(['\ud83d\udee1\ufe0f', 'The Strongest Mosquito Net in Two Worlds', 'Build a perfect ward. Then make it humble.']);
    ach.push(['\ud83e\udeb3', 'Defeated by the Flying Kind', 'Learn what every soul on this island already knows.']);
    if (state.flags.haggled) ach.push(['\ud83e\udde7', 'Market Grandmaster', 'Win 500 coins and one fan with words alone.']);
    if (state.flags.route === 'a') ach.push(['\ud83d\udc4f', 'Bare-Hand Technique', 'One clap. One kill. Five misses. We only count the clap.']);
    else if (state.flags.route === 'b') ach.push(['\ud83c\udfea', 'Midnight Pilgrim', 'Discover the temple that never closes.']);
    else if (state.flags.route === 'c') ach.push(['\ud83e\uddd8', 'Three Hundred Years of Dignity (Intact)', 'Solve it the master\u2019s way: by giving up the master\u2019s way.']);
    if (state.flags.tenant_hook_early) ach.push(['\ud83d\udd0d', 'The Unfinished Sentence', 'Ask the question Mrs. Lin did not answer.']);
    var achHtml = '';
    for (var i = 0; i < ach.length; i++) {
      achHtml += '<div class="ach"><span class="name">' + ach[i][0] + ' ' + ach[i][1] + '</span><br><span class="desc">' + ach[i][2] + '</span></div>';
    }
    var html =
      '<p>At 07:30 exactly, the talking brick clears a throat it does not have.</p>' +
      '<div class="ai">Good morning, sir. Your report.<br><br>' +
      'Funds: NT$' + money + '.<br>' +
      'Rent due in 30 days: NT$' + rent + '.<br><br>' +
      'I did the math twice. It did not improve.</div>' +
      '<p>You look at the numbers. The numbers look back, unafraid.</p>' +
      '<div class="ai">Conclusion: you need a job. Here \u2014 \u201cBuilding security guard. Night shift. NT$32,000 a month. No experience needed.\u201d<br><br>' +
      'You stand very still for long periods and glare at things. Sir, you are overqualified.</div>' +
      '<p>You read the words again. <em>Security guard.</em> A person this realm pays \u2014 every month, in coins \u2014 to keep things out.</p>' +
      '<p>\u201cThis realm posts guarding missions,\u201d you say slowly.</p>' +
      '<div class="ai">It\u2019s a job, sir.</div>' +
      '<p>\u201cThree hundred years,\u201d you tell the ceiling, \u201cand the immortal realm wants me to guard a door.\u201d</p>' +
      '<div class="ai">For NT$32,000. Should I send your r\u00e9sum\u00e9? It\u2019s one line long, and I wrote it, so it\u2019s excellent.</div>' +
      '<p>Morning wind moves through the window \u2014 and the tape on the old screen hole lifts and falls, open like a small door. Whatever tore it open is still out there. You will ask Mrs. Lin about the last tenant. Later.</p>' +
      '<div class="endhead">Episode 1 Complete</div>' +
      achHtml +
      '<div class="endhead">Definition Library \u00b7 v0.1</div>' +
      '<div class="libcard">RULE 01 \u2014 INSECTS: DENY<br>RANGE \u2014 ONE BED<br><br>UNDEFINED: tame lightning \u00b7 the invisible thread \u00b7 this entire world</div>';
    return { label: 'Section 10 \u00b7 Morning Report', time: 'DAY 2 \u00b7 07:30', html: html,
      choices: [
        { t: 'EPISODE 2 \u2014 THE NIGHT SHIFT \u00b7 Coming soon', to: '__locked__' },
        { t: 'Play Episode 1 again', to: '__restart__' }
      ] };
  }
};

/* ============ auto-linker ============ */
var TERMS = Object.keys(VOCAB);
var SKIP_CLASSES = ['cast', 'libcard', 'endhead', 'seclabel', 'quiet', 'choices', 'brand', 'kotitle', 'level-badge', 'subtitle', 'wardline'];

function isLetter(ch) { return ch >= 'a' && ch <= 'z' || ch >= 'A' && ch <= 'Z'; }

function ciFind(text, term, from) {
  var lt = text.toLowerCase(), lterm = term.toLowerCase();
  var idx = lt.indexOf(lterm, from);
  while (idx !== -1) {
    var before = idx > 0 ? text.charAt(idx - 1) : '';
    var after = (idx + term.length < text.length) ? text.charAt(idx + term.length) : '';
    if (!isLetter(before) && !isLetter(after)) return idx;
    idx = lt.indexOf(lterm, idx + 1);
  }
  return -1;
}

function skipNode(node) {
  var p = node.parentNode;
  while (p && p.id !== 'wrap') {
    if (p.tagName === 'BUTTON') return true;
    if (p.classList) {
      for (var i = 0; i < SKIP_CLASSES.length; i++) {
        if (p.classList.contains(SKIP_CLASSES[i])) return true;
      }
      if (p.classList.contains('vb')) return true;
    }
    p = p.parentNode;
  }
  return false;
}

function processTextNode(node) {
  var text = node.nodeValue;
  if (!text || !/[A-Za-z]/.test(text)) return;
  var bestIdx = -1, bestTerm = null;
  for (var i = 0; i < TERMS.length; i++) {
    var term = TERMS[i];
    if (state.seen[term]) continue;
    var idx = ciFind(text, term, 0);
    if (idx === -1) continue;
    if (bestIdx === -1 || idx < bestIdx || (idx === bestIdx && term.length > bestTerm.length)) {
      bestIdx = idx; bestTerm = term;
    }
  }
  if (bestTerm === null) return;
  var matchText = text.substr(bestIdx, bestTerm.length);
  var pre = text.slice(0, bestIdx);
  var post = text.slice(bestIdx + bestTerm.length);
  var span = document.createElement('span');
  span.className = 'vb';
  span.setAttribute('data-d', VOCAB[bestTerm][0]);
  span.setAttribute('data-z', VOCAB[bestTerm][1]);
  span.textContent = matchText;
  var parent = node.parentNode;
  if (pre) parent.insertBefore(document.createTextNode(pre), node);
  parent.insertBefore(span, node);
  var postNode = document.createTextNode(post);
  parent.insertBefore(postNode, node);
  parent.removeChild(node);
  state.seen[bestTerm] = 1;
  processTextNode(postNode);
}

function linkify() {
  if (cur === 'title') return;
  var walker = document.createTreeWalker(wrap, NodeFilter.SHOW_TEXT, null, false);
  var nodes = [];
  var n;
  while ((n = walker.nextNode())) nodes.push(n);
  for (var i = 0; i < nodes.length; i++) {
    if (nodes[i].parentNode && !skipNode(nodes[i])) processTextNode(nodes[i]);
  }
}

/* ============ engine ============ */
var wrap = document.getElementById('wrap');
var moneyView = document.getElementById('moneyView');
var shieldView = document.getElementById('shieldView');

function renderBar() {
  if (cur === 'title') { moneyView.textContent = ''; shieldView.textContent = ''; return; }
  moneyView.textContent = '\ud83d\udcb0 NT$' + state.money.toLocaleString('en-US');
  shieldView.textContent = state.barrier ? '\ud83d\udee1\ufe0f ' + state.barrier : '';
}

function render() {
  closeTip();
  var sec = sections[cur]();
  var html = '';
  if (sec.label) html += '<div class="seclabel">' + sec.label + '</div>';
  if (sec.time) html += '<div class="quiet stamp">' + sec.time + '</div>';
  html += sec.html;
  html += '<div class="choices" id="choices"></div>';
  wrap.innerHTML = html;
  linkify();
  var box = document.getElementById('choices');
  sec.choices.forEach(function (c) {
    var b = document.createElement('button');
    b.className = 'ch' + (c.to === '__locked__' ? ' locked' : '');
    b.innerHTML = c.t;
    b.addEventListener('click', function () {
      if (c.to === '__locked__') return;
      if (c.to === '__restart__') { askRestart(); return; }
      if (c.to === '__continue__') {
        var data = loadSave();
        if (data) { state = data.state; if (!state.seen) state.seen = {}; cur = data.cur; renderBar(); render(); }
        return;
      }
      if (c.fx) c.fx();
      goto_(c.to);
    });
    box.appendChild(b);
  });
  renderBar();
  window.scrollTo(0, 0);
}

function goto_(id) { cur = id; save(); render(); }

/* ============ tooltip ============ */
var tip = document.getElementById('tip');
var openVb = null;
function closeTip() { tip.style.display = 'none'; openVb = null; }

document.addEventListener('click', function (e) {
  var t = e.target;
  if (t.classList && t.classList.contains('vb')) {
    if (openVb === t) { closeTip(); return; }
    openVb = t;
    tip.innerHTML = t.getAttribute('data-d') + '<span class="zh">' + t.getAttribute('data-z') + '</span>';
    tip.style.display = 'block';
    tip.style.left = '0px';
    tip.style.top = '0px';
    requestAnimationFrame(function () {
      var r = t.getBoundingClientRect();
      var tw = tip.offsetWidth, th = tip.offsetHeight, pad = 10;
      var x = r.left + r.width / 2 - tw / 2;
      x = Math.max(pad, Math.min(x, window.innerWidth - tw - pad));
      var y = r.top - th - 8;
      if (y < pad) y = r.bottom + 8;
      tip.style.left = (x + window.scrollX) + 'px';
      tip.style.top = (y + window.scrollY) + 'px';
    });
  } else if (!tip.contains(t)) {
    closeTip();
  }
});

/* ============ restart modal ============ */
var overlay = document.getElementById('overlay');
function askRestart() { overlay.style.display = 'flex'; }
document.getElementById('mCancel').addEventListener('click', function () { overlay.style.display = 'none'; });
document.getElementById('mOk').addEventListener('click', function () {
  overlay.style.display = 'none';
  clearSave();
  state = defaultState();
  cur = 'title';
  render();
});
document.getElementById('restartLink').addEventListener('click', function (e) { e.preventDefault(); askRestart(); });

/* ============ boot ============ */
render();
</script>
