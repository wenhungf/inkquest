<style>
  html, body {
    background: #0b1016 !important;
    color-scheme: dark;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  }
  /* ---------- status bar ---------- */
  #bar {
    position: sticky; top: 0; z-index: 50;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px;
    background: rgba(11,16,22,0.92);

    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #8b96a3;
  }
  #bar .stats { display: flex; gap: 14px; letter-spacing: 0.04em; text-transform: none; font-size: 13px; }
  #bar .money { color: #e0a458; font-variant-numeric: tabular-nums; }
  #bar .shield { color: #67d9a6; }
  /* ---------- layout ---------- */
  #wrap { max-width: 620px; margin: 0 auto; padding: 28px 22px 80px; }
  .seclabel {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;

  }
  .quiet {
    color: #6b7682; font-size: 0.85em;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    letter-spacing: 0.08em;
  }
  .stamp { margin-bottom: 22px; }
  p { margin-bottom: 1.1em; }
  .beat {
    margin: 1.4em 0; padding-left: 14px;
    border-left: 2px solid #2a3a4a;
    color: #f2eee2;
  }
  .ai {
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 0.88em;
    color: #9fe8c4;
    background: rgba(103,217,166,0.06);
    border-left: 2px solid #2e6e54;
    padding: 10px 14px;
    margin: 1.2em 0;
    border-radius: 0 6px 6px 0;
  }
  .cast {
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    letter-spacing: 0.3em; text-transform: uppercase; font-size: 14px;
    color: #aef0d0;
    margin: 1.8em 0;
    padding: 16px 0;
    border-top: 1px solid rgba(103,217,166,0.4);
    border-bottom: 1px solid rgba(103,217,166,0.4);
    text-shadow: 0 0 18px rgba(103,217,166,0.8);
    animation: wardglow 2.4s ease-in-out infinite alternate;
  }
  @keyframes wardglow {
    from { text-shadow: 0 0 8px rgba(103,217,166,0.5); }
    to   { text-shadow: 0 0 22px rgba(103,217,166,0.95); }
  }
  @media (prefers-reduced-motion: reduce) {
    .cast { animation: none; }
  }
  /* ---------- vocab ---------- */
  .vb {
    border-bottom: 1px dotted #e0a458;
    color: #f0d9ad;
    cursor: pointer;
  }
  #tip {
    position: absolute; z-index: 100;
    width: max-content;
    max-width: min(300px, 80vw);
    white-space: normal;
    background: #18222e;
    border: 1px solid #34465a;
    border-radius: 8px;
    padding: 10px 13px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 13.5px; line-height: 1.5;
    color: #dfe6ee;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    display: none;
  }
  #tip .zh { color: #e0a458; margin-top: 2px; display: block; }
  /* ---------- choices ---------- */
  .choices { margin-top: 2em; display: flex; flex-direction: column; gap: 12px; }
  button.ch {
    font-family: Georgia, serif;
    font-size: 16px; line-height: 1.5;
    text-align: left;
    color: #e9e4d6;
    background: #131b25;
    border: 1px solid #283544;
    border-left: 3px solid #67d9a6;
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button.ch:hover, button.ch:focus-visible { background: #1a2532; outline: none; }
  button.ch:focus-visible { border-color: #67d9a6; }
  button.ch.locked {
    border-left-color: #3a4654; color: #5d6874; cursor: default;
  }
  /* ---------- title & end screens ---------- */
  .title-screen { text-align: center; padding-top: 9vh; }
  .brand {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: #6b7682;
    margin-bottom: 30px;
  }
  h1.kotitle {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-weight: 800;
    font-size: clamp(46px, 13vw, 72px);
    letter-spacing: 0.06em;
    color: #eef3f0;
    text-shadow: 0 0 30px rgba(103,217,166,0.35);
    margin-bottom: 6px;
  }
  .subtitle { color: #9aa6b2; font-style: italic; margin-bottom: 8px; }
  .level-badge {
    display: inline-block;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 11px; letter-spacing: 0.2em;
    color: #67d9a6; border: 1px solid #2e6e54; border-radius: 99px;
    padding: 4px 14px; margin-bottom: 40px;
  }
  .wardline {
    height: 1px; max-width: 220px; margin: 0 auto 40px;
    background: linear-gradient(90deg, transparent, #67d9a6, transparent);
    box-shadow: 0 0 12px rgba(103,217,166,0.6);
  }
  .ach {
    background: #121a24; border: 1px solid #283544; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 12px;
  }
  .ach .name { color: #f0d9ad; font-family: -apple-system, system-ui, sans-serif; font-weight: 600; font-size: 15px; }
  .ach .desc { color: #8b96a3; font-size: 14px; font-family: -apple-system, system-ui, sans-serif; }
  .libcard {
    background: rgba(103,217,166,0.05); border: 1px solid #2e6e54; border-radius: 10px;
    padding: 16px; margin: 20px 0;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 14px;
    color: #9fe8c4;
  }
  .endhead {
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: #8b96a3; margin: 28px 0 12px;
  }
  /* ---------- footer ---------- */
  footer {
    max-width: 620px; margin: 0 auto; padding: 24px 22px 48px;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 12px; color: #51606e; text-align: center;
  }
  footer a { color: #6b7f93; }
  /* ---------- modal ---------- */
  #overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(5,8,12,0.75);
    display: none; align-items: center; justify-content: center;
  }
  #modal {
    background: #141d28; border: 1px solid #34465a; border-radius: 12px;
    max-width: 320px; margin: 20px; padding: 22px;
    font-family: -apple-system, system-ui, sans-serif; font-size: 15px;
  }
  #modal .mbtns { display: flex; gap: 10px; margin-top: 18px; }
  #modal button {
    flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer;
    border: 1px solid #34465a; background: #1a2532; color: #e9e4d6;
    font-family: inherit;
  }
  #modal button.danger { border-color: #8a4040; color: #e8a0a0; }
</style>

<script>
'use strict';

/* ============ vocab helper ============ */
function v(word, def, zh) {
  return '<span class="vb" data-d="' + def + '" data-z="' + zh + '">' + word + '</span>';
}

/* ============ state ============ */
var SAVE_KEY = 'inkquest_keepout_ep1_v1';
function defaultState() {
  return { v: 1, money: 50000, barrier: '', flags: {} };
}
var state = defaultState();
var cur = 'title';

function save() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({ v: 1, cur: cur, state: state }));
  } catch (e) { /* private mode: play without saving */ }
}
function loadSave() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    var data = JSON.parse(raw);
    if (data && data.v === 1 && data.cur && data.state) return data;
  } catch (e) { }
  return null;
}
function clearSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) { }
}

/* ============ shared vocab snippets ============ */
var W = {
  ward: function () { return v('ward', 'a magic wall made of rules that blocks things', '結界'); },
  landlord: function () { return v('landlord', 'the person who owns the room you rent', '房東'); },
  rent: function () { return v('rent', 'the money you pay every month for a room', '房租'); },
  deposit: function () { return v('deposit', 'money you pay first and get back when you leave', '押金'); },
  contract: function () { return v('contract', 'the paper you sign when you agree to rent', '合約'); },
  receipt: function () { return v('receipt', 'a small paper that shows you paid', '收據'); }
};

/* ============ sections ============ */
var sections = {

  /* ---------- title ---------- */
  title: function (s) {
    var hasSave = !!loadSave();
    var html = '<div class="title-screen">' +
      '<div class="brand">InkQuest presents</div>' +
      '<h1 class="kotitle">KEEP OUT</h1>' +
      '<div class="subtitle">Episode 1 · The Cheap Room</div>' +
      '<div class="level-badge">ENGLISH · A2</div>' +
      '<div class="wardline"></div>' +
      '<p class="quiet" style="margin-bottom:34px;">A cultivation master. A rooftop room in Taipei.<br>And the first war of his new life.</p>' +
      '</div>';
    var choices = [{ t: 'Begin', to: 'e1s1', fx: function () { state = defaultState(); } }];
    if (hasSave) {
      choices.push({ t: 'Continue', to: '__continue__' });
    }
    return { label: '', time: '', html: html, choices: choices };
  },

  /* ---------- 1 · the last bolt ---------- */
  e1s1: function (s) {
    var html =
      '<p>The ninth bolt of ' + v('tribulation', 'the final test of lightning from heaven', '天劫') + ' lightning dies in the clouds above you. Smoke rises from your robe. Your hair stands up like an angry cat.</p>' +
      '<p>Three hundred years of training. Nine bolts of heaven\u2019s anger. And you are still standing.</p>' +
      '<p>You won.</p>' +
      '<p>A bright voice speaks inside your head.</p>' +
      '<div class="ai">Congratulations, Host! ' + v('Ascension', 'rising from the human world to the immortal world', '飛升') + ' complete. Reward: 5,000,000 high-grade ' + v('spirit stones', 'the money of the cultivation world', '靈石') + '.</div>' +
      '<p>\u201cFive million\u2014\u201d you whisper.</p>' +
      '<div class="ai">Auto-converting to local immortal currency\u2026 Done! 50,000 immortal coins. All tasks complete. Goodbye, Host. May we meet again!</div>' +
      '<p>\u201cWait. Converting? At what rate? Who set the\u2014\u201d</p>' +
      '<p>The voice is gone. The sky opens. Light takes you.</p>' +
      '<p class="beat">Somewhere between worlds, you do the math. Five million to fifty thousand. One hundred to one. You have been robbed, and the shop has already closed.</p>';
    return {
      label: 'Section 1 · The Last Bolt',
      time: 'THE OLD WORLD — THE LAST DAY',
      html: html,
      choices: [{ t: 'Open your eyes.', to: 'e1s2' }]
    };
  },

  /* ---------- 2 · the hot realm ---------- */
  e1s2: function (s) {
    var html =
      '<p>Heat hits you like an open oven.</p>' +
      '<p>You stand in a narrow lane between tall buildings. The air is wet and heavy. Below the noise of a thousand metal beasts, you hear water dripping from white boxes on every wall. Towers of glass climb into the sky. Far above them, a metal bird crosses the clouds without moving its wings.</p>' +
      '<p>\u201cSo this is the immortal realm,\u201d you say to no one.</p>' +
      '<p>It is louder than you expected. And much, much hotter.</p>' +
      '<p>Three hours later \u2014 you do not wish to talk about those three hours \u2014 you stand in front of a paper sign taped to a metal door:</p>' +
      '<p class="beat">ROOM FOR RENT \u00b7 ROOFTOP \u00b7 CHEAP</p>' +
      '<p>You can read it. Ascension opens all tongues to the ascended \u2014 every child in your old sect knew that. What ascension does not give you is a place to sleep.</p>' +
      '<p><em>Cheap.</em> You have 50,000 immortal coins and a whole new world. You climb the stairs.</p>';
    return {
      label: 'Section 2 · The Hot Realm',
      time: 'DAY 1 · 14:07 · TAIPEI',
      html: html,
      choices: [{ t: 'Knock on the rooftop door.', to: 'e1s3' }]
    };
  },

  /* ---------- 3 · the room on the roof ---------- */
  e1s3: function (s) {
    var html =
      '<p>The ' + W.landlord() + ' is a small woman with fast eyes and a ring of keys. \u201cMrs. Lin,\u201d she says, and that is the whole introduction.</p>' +
      '<p>The room sits on the roof like a metal box that someone forgot. One room. A tin roof. One window with a ' + v('window screen', 'a net on a window that stops insects', '紗窗') + '. A toilet behind a plastic door. An old air conditioner hangs on the wall like a tired animal.</p>' +
      '<p>\u201cIt works when it wants to,\u201d Mrs. Lin says, following your eyes.</p>' +
      '<p>Inside, the heat could roast tea leaves. You once meditated inside a volcano for forty-nine days, so you nod politely.</p>' +
      '<p>\u201c' + v('Rent', 'the money you pay every month for a room', '房租') + ' is 8,500 a month,\u201d she says. \u201c' + v('Deposit', 'money you pay first and get back when you leave', '押金') + ' is two months. First month up front. You pay today, you sleep here today.\u201d</p>' +
      '<p>You count in your head. 25,500 coins. Half your fortune, gone in one breath.</p>';
    return {
      label: 'Section 3 · The Room on the Roof',
      time: 'DAY 1 · 16:40',
      html: html,
      choices: [
        {
          t: '\u201cToo expensive. The roof is rust and the screen has a hole.\u201d — Haggle like a market grandmaster.',
          to: 'e1s3a',
          fx: function () { state.flags.haggled = true; state.flags.hasFan = true; }
        },
        {
          t: '\u201cI will take it.\u201d — You are rich. Probably.',
          to: 'e1s3b'
        },
        {
          t: '\u201cWhy is it so cheap?\u201d',
          to: 'e1s3c',
          fx: function () { state.flags.tenant_hook_early = true; }
        }
      ]
    };
  },

  e1s3a: function (s) {
    var html =
      '<p>Three hundred years in a sect teaches you three arts: the sword, the pill fire, and the market war outside the mountain gate, where old women sell herbs and take no prisoners.</p>' +
      '<p>You point at the rust on the roof. You point at the crack above the door. You touch the wall and show her the paint on your finger like evidence of a crime.</p>' +
      '<p>Mrs. Lin fights well. She praises the view. She praises the \u201cnatural air flow,\u201d which is a hole. For six minutes the lane below hears two masters at work.</p>' +
      '<p>\u201cEight thousand,\u201d she says at last. \u201cFinal. And take the fan in the corner. The last tenant left it.\u201d</p>' +
      '<p>An old electric fan stands by the wall, dusty but whole. You bow, very slightly. She nods, very slightly. Respect.</p>';
    return {
      label: 'Section 3 · continued',
      time: '',
      html: html,
      choices: [{
        t: 'Sign and pay. (Rent 8,000 + deposit 16,000)',
        to: 'e1s4',
        fx: function () { state.money -= 24000; }
      }]
    };
  },

  e1s3b: function (s) {
    var html =
      '<p>\u201cI will take it,\u201d you say.</p>' +
      '<p>Mrs. Lin blinks. Nobody says yes that fast. Not to this room. Not in this heat.</p>' +
      '<p>She looks at you again, head to toe \u2014 the strange old-style clothes, the calm face, the posture of a man who has stood guard for a century. Rich, she decides. Or strange. Or both. Both make fine tenants.</p>' +
      '<p>\u201cGood,\u201d she says, already pulling papers from her bag. \u201cI like a fast decision. Slow people\u2026\u201d</p>' +
      '<p>She does not finish the sentence. You will learn that she rarely does.</p>';
    return {
      label: 'Section 3 · continued',
      time: '',
      html: html,
      choices: [{
        t: 'Sign and pay. (Rent 8,500 + deposit 17,000)',
        to: 'e1s4',
        fx: function () { state.money -= 25500; }
      }]
    };
  },

  e1s3c: function (s) {
    var html =
      '<p>\u201cWhy is it so cheap?\u201d</p>' +
      '<p>Mrs. Lin\u2019s eyes slide to the window. Just for a moment.</p>' +
      '<p>\u201cTop floor is hot,\u201d she says. \u201cRain is loud. Young people have no patience. The last tenant\u2026 left quickly.\u201d</p>' +
      '<p>She does not finish the sentence. She watches you instead, the way a chess player watches the board after a quiet move.</p>' +
      '<p>On the window, you notice it now: the screen has a small hole, ' + v('patched', 'fixed with tape or cloth', '修補過的') + ' with clear tape. The tape hangs open, peeled back, like a small door someone forced.</p>' +
      '<p>\u201cSo,\u201d Mrs. Lin says. \u201cYou want it or not?\u201d</p>';
    return {
      label: 'Section 3 · continued',
      time: '',
      html: html,
      choices: [{
        t: 'Sign and pay. (Rent 8,500 + deposit 17,000)',
        to: 'e1s4',
        fx: function () { state.money -= 25500; }
      }]
    };
  },

  /* ---------- 4 · ink and money ---------- */
  e1s4: function (s) {
    var paid = state.flags.haggled ? '24,000' : '25,500';
    var html =
      '<p>The ' + W.contract() + ' is two pages. You read every word, because a man who signs without reading deserves what he gets \u2014 your first master taught you that, one hour before he sold you to the sect.</p>' +
      '<p>You sign your name. The pen is light as a feather and the strokes come out like a sword form. Mrs. Lin turns the paper sideways. \u201c\u2026Is that a name?\u201d</p>' +
      '<p>Then you count out ' + paid + ' coins into her hand. The money leaves your fingers one paper at a time. Once, you handed a thousand-year ginseng to your master with less pain than this.</p>' +
      '<p>Mrs. Lin writes you a ' + W.receipt() + ', folds it twice, and gives the rules: no fire on the roof, no noise after midnight, garbage goes down at seven.</p>' +
      '<p>Then she points at you with the folded receipt.</p>' +
      '<p>\u201cYou need a phone. If the roof ' + v('leaks', 'when water gets in through a hole', '漏水') + ', how do I call you? Buy a phone. Today.\u201d</p>' +
      '<p>\u201cThe roof leaks?\u201d you ask.</p>' +
      '<p>\u201cBuy a phone,\u201d she repeats, and is already halfway down the stairs.</p>';
    return {
      label: 'Section 4 · Ink and Money',
      time: 'DAY 1 · 17:15',
      html: html,
      choices: [{
        t: 'Go find this \u201cphone.\u201d (Phone 11,900 + prepaid card 488)',
        to: 'e1s5',
        fx: function () { state.money -= 12388; }
      }]
    };
  },

  /* ---------- 5 · the talking brick ---------- */
  e1s5: function (s) {
    var fanLine = state.flags.hasFan
      ? '<p>At a bright, cold store the size of a sect hall, you buy the things a mortal life needs: a folding ' + v('mattress', 'the soft thing you sleep on', '床墊') + ', thin summer bedding, ' + v('slippers', 'soft shoes for inside the house', '拖鞋') + ', soap, a tower of instant noodles. The fan, at least, is free \u2014 a gift from a war well fought.</p>'
      : '<p>At a bright, cold store the size of a sect hall, you buy the things a mortal life needs: a folding ' + v('mattress', 'the soft thing you sleep on', '床墊') + ', thin summer bedding, ' + v('slippers', 'soft shoes for inside the house', '拖鞋') + ', soap, a tower of instant noodles \u2014 and an electric fan, because the room on the roof is an oven with a window.</p>';
    var html =
      '<p>The phone shop glows white like a healer\u2019s hall. A young clerk sells you \u201ca basic one\u201d \u2014 11,900 coins \u2014 and a ' + v('prepaid card', 'a card you pay first, then use the phone', '預付卡') + ' for 488 more.</p>' +
      '<p>You hold the black glass brick in your palm. It is lighter than a low-grade jade slab and ten times the price.</p>' +
      '<p>The screen wakes and asks you to choose an ' + v('assistant', 'a helper; here, a talking program in the phone', '助理') + ' personality. A long list scrolls past. Your finger picks one at random.</p>' +
      '<p class="beat">BOBA \u2014 50% sugar \u00b7 200% sass</p>' +
      '<p>The phone speaks.</p>' +
      '<div class="ai">Hi! I\u2019m Boba. Let\u2019s set up your\u2014</div>' +
      '<p>Your hand closes around it. The clerk takes one step back.</p>' +
      '<p><em>That voice.</em></p>' +
      '<p>\u201cSystem?\u201d you whisper. \u201cYou came back? You owe me an exchange rate, you little\u2014\u201d</p>' +
      '<div class="ai">Sir, I am an AI assistant. Please stop squeezing me. Your battery is at 100%. Your social skills, somewhat lower.</div>' +
      '<p>Same voice. Same sweetness. Same knife under the sugar.</p>' +
      '<p>Systems do not come back. Every cultivator knows this. A system finishes its task and is gone forever, like youth, like your 24,000 coins. And yet\u2014</p>' +
      '<div class="ai">Do you want to finish setup, or do you want to keep scaring the staff?</div>' +
      fanLine +
      '<p>The sun goes down somewhere behind the towers. You carry your whole new life up six floors.</p>';
    return {
      label: 'Section 5 · The Talking Brick',
      time: 'DAY 1 · 18:50',
      html: html,
      choices: [{
        t: 'Carry it all home.',
        to: 'e1s6',
        fx: function () { state.money -= (state.flags.hasFan ? 6196 : 7486); }
      }]
    };
  },

  /* ---------- 6 · the first war ---------- */
  e1s6: function (s) {
    var html =
      '<p>Night. The tin roof clicks as it cools, like a slow clock. The heat does not leave; it just sits down and makes itself comfortable.</p>' +
      '<p>You lie on the new mattress and listen to your kingdom. The hum of the city below. Water moving in a pipe inside the wall. Far away, a dog with opinions.</p>' +
      '<p>Then, from the corner: <em>tk\u2026 tk\u2026 tk.</em></p>' +

/* ============ engine ============ */
var wrap = document.getElementById('wrap');
var moneyView = document.getElementById('moneyView');
var shieldView = document.getElementById('shieldView');

function renderBar() {
  if (cur === 'title') {
    moneyView.textContent = '';
    shieldView.textContent = '';
    return;
  }
  moneyView.textContent = '\ud83d\udcb0 NT$' + state.money.toLocaleString('en-US');
  shieldView.textContent = state.barrier ? '\ud83d\udee1\ufe0f ' + state.barrier : '';
}

function render() {
  closeTip();
  var sec = sections[cur](state);
  var html = '';
  if (sec.label) html += '<div class="seclabel">' + sec.label + '</div>';
  if (sec.time) html += '<div class="quiet stamp">' + sec.time + '</div>';
  html += sec.html;
  html += '<div class="choices" id="choices"></div>';
  wrap.innerHTML = html;
  var box = document.getElementById('choices');
  sec.choices.forEach(function (c) {
    var b = document.createElement('button');
    b.className = 'ch' + (c.to === '__locked__' ? ' locked' : '');
    b.innerHTML = c.t;
    b.addEventListener('click', function () {
      if (c.to === '__locked__') return;
      if (c.to === '__restart__') { askRestart(); return; }
      if (c.to === '__continue__') {
        var data = loadSave();
        if (data) { state = data.state; cur = data.cur; renderBar(); render(); }
        return;
      }
      if (c.fx) c.fx();
      goto_(c.to);
    });
    box.appendChild(b);
  });
  renderBar();
  window.scrollTo(0, 0);
}

function goto_(id) {
  cur = id;
  save();
  render();
}

/* ============ tooltip ============ */
var tip = document.getElementById('tip');
var openVb = null;

function closeTip() {
  tip.style.display = 'none';
  openVb = null;
}

document.addEventListener('click', function (e) {
  var t = e.target;
  if (t.classList && t.classList.contains('vb')) {
    if (openVb === t) { closeTip(); return; }
    openVb = t;
    tip.innerHTML = t.getAttribute('data-d') + '<span class="zh">' + t.getAttribute('data-z') + '</span>';
    tip.style.display = 'block';
    tip.style.left = '0px';
    tip.style.top = '0px';
    requestAnimationFrame(function () {
      var r = t.getBoundingClientRect();
      var tw = tip.offsetWidth;
      var th = tip.offsetHeight;
      var pad = 10;
      var x = r.left + r.width / 2 - tw / 2;
      x = Math.max(pad, Math.min(x, window.innerWidth - tw - pad));
      var y = r.top - th - 8;
      if (y < pad) y = r.bottom + 8; /* flip below when near top */
      tip.style.left = (x + window.scrollX) + 'px';
      tip.style.top = (y + window.scrollY) + 'px';
    });
  } else if (!tip.contains(t)) {
    closeTip();
  }
});

/* ============ restart modal ============ */
var overlay = document.getElementById('overlay');
function askRestart() { overlay.style.display = 'flex'; }
document.getElementById('mCancel').addEventListener('click', function () {
  overlay.style.display = 'none';
});
document.getElementById('mOk').addEventListener('click', function () {
  overlay.style.display = 'none';
  clearSave();
  state = defaultState();
  cur = 'title';
  render();
});
document.getElementById('restartLink').addEventListener('click', function (e) {
  e.preventDefault();
  askRestart();
});

/* ============ boot ============ */
render();
</script>
