  <p>You run for the old ${vb('fort')} on the hill. Halfway there, at the edge of the harbor wall, you catch a glimpse of someone feeding the stray cats — small, neat, a familiar cardigan despite the heat.</p>
  <p>Old Mr. Hong. He does not see you. You do not have time to stop.</p>
  <p class="quiet">Next time, you promise. You are collecting a lot of those promises.</p>`,
 choices:[ {t:'Reach the fort', go:'e4s10'} ]
},

e4s10:{
 html:()=>`
  <p>The old fort sits at the top of the hill, its thick walls facing out to sea. You look for the mark — but the fort is large, and there is no glow in sight. Read the place.</p>
  ${sysBox('\ud83d\udd0d THE FORT','carved by the gate',[
    ['flair','"The '+vb('waves','waves')+' bring '+vb('invaders','invaders')+' that iron balls '+vb('greet','greet')+';'],
    ['flair','Stand with the '+vb('brave','brave')+', not with the '+vb('meek','meek')+'."']
  ])}
  <p>You stand in the middle of the old fort and turn in a slow circle, the riddle going round with you.</p>
  <p>Behind you, inland, the shaded courtyard and the barracks — where the soldiers ate and slept and waited, the warm heart of the place, out of the wind. Ahead, the outer wall facing the sea, baking in the sun, where the old cannons still sit on their mounts, pointed out at the open water the way they have been for more than a hundred years.</p>`,
 choices:[
   {t:'The seaward wall, where the cannons faced.', go:'e4s10_sea'},
   {t:'The shaded courtyard inside.', go:'e4s10_in'}
 ]
},

e4s10_sea:{
 html:()=>`
  <p>You walk out to the seaward wall, to the old cannons still pointing at the horizon, and look out at the open water the way the fort always has. The mark blooms on the stone the moment you reach the edge.</p>
  ${sysBox('\u2705 LINK 2 COMPLETE','Read correctly',[
    ['flair',vb('Stamina','stamina')+' \u221215 \u00b7 +20'],
    ['flair','Clean. Link 3 unlocked.']
  ])}`,
 onEnter:()=>{ state.stamina = Math.min(130, state.stamina + 5); },
 choices:[ {t:'Link three', go:'e4s11'} ]
},

e4s10_in:{
 onEnter:()=>{ state.flags.chain_perfect = false; },
 html:()=>`
  <p>You head inland, into the shaded courtyard, and search the cool stone walls. Nothing. No glow, no ping. A fort does not keep its meaning in its courtyard — it keeps it at the wall that faces the threat.</p>
  ${sysBox('\u26a0 STUMBLE','You read the place wrong.',[
    ['flair','The chain holds \u2014 but a clean run is no longer possible.'],
    ['flair','Try the seaward wall, where the cannons faced.']
  ],'fail')}
  <p>You backtrack out to the seaward gun positions, into the wind, and there the mark waits — where it was always going to be. You lost minutes. You move on.</p>`,
 choices:[ {t:'Link three', go:'e4s11'} ]
},

e4s11:{
 html:()=>`
  ${sysBox('\ud83d\udd17 LINK 3 of 5','The Star Tunnel',[
    ['flair','Cijin\u2019s old tunnel, '+vb('carved','carved')+' through the hill by the sea.'],
    ['flair','"Who '+vb('carves','carves')+' through stone to hide in the dark?'],
    ['flair',vb('Shatter','shatter')+' the mountain to '+vb('claim','claim')+' the sea\'s '+vb('sparks','sparks')+'."']
  ])}
  <p>Not far from the fort, the old Star Tunnel runs straight through the rock — a long dark throat in the hillside, cut long ago so soldiers and supplies could pass through the hill unseen, safe from the guns of ships at sea. You step inside, and the daylight drops away behind you.</p>
  <p>The dark goes on. Painted stars glow faintly on the ceiling, and they are lovely — the kind of thing you are clearly meant to stop and admire, the reason the place has its name. But the riddle ${vb('scratches','scratches')} at you: <i>Who ${vb('carves','carves')} through stone to hide in the dark?</i></p>
  <p>You could slow down here under the stars and search properly. Or keep walking, into more dark, toward whatever is at the far end.</p>`,
 choices:[
   {t:'Search the dark walls for the mark.', go:'e4s11_walls'},
   {t:'Walk all the way through, to the far opening.', go:'e4s11_end'}
 ]
},

e4s11_walls:{
 onEnter:()=>{ state.flags.chain_perfect = false; },
 html:()=>`
  <p>You slow down in the middle of the tunnel, scanning the dark walls, the painted stars, the damp stone. Nothing answers. The mark is not in the dark.</p>
  ${sysBox('\u26a0 STUMBLE','You read the place wrong.',[
    ['flair','The chain holds \u2014 but a clean run is no longer possible.'],
    ['flair','A tunnel is not made for its middle. Keep walking.']
  ],'fail')}
  <p>You walk on, and the dark begins to thin, and ahead a circle of blue light grows — and you understand. You lost time in the middle of the dark. You move toward the end.</p>`,
 choices:[ {t:'To the far opening', go:'e4s11_end'} ]
},

e4s11_end:{
 html:()=>`
  <p>You walk the whole length of the dark, and then the tunnel opens — all at once — onto the sea.</p>
  <p>That is what the tunnel is <i>for:</i> not the dark, but the light at the end of it. A wide blue bay, framed by black rock, the open water bright after the long shadow. The mark blooms on the tunnel mouth, glowing against the daylight.</p>
  ${sysBox('\u2705 LINK 3 COMPLETE','Read correctly',[
    ['flair',vb('Stamina','stamina')+' \u221210 \u00b7 +15'],
    ['flair','Clean. Link 4 unlocked.']
  ])}
  <p>You stand for one breath at the bright end of the dark. Then you turn back for the ferry. There is still a harbor to cross, and a hill to climb.</p>`,
 onEnter:()=>{ state.stamina = Math.min(130, state.stamina + 5); },
 choices:[ {t:'Back across the water', go:'e4s12'} ]
},

e4s12:{
 html:()=>`
  <p>The ferry back passes in a ${vb('blur')} — a quick crossing, the city growing in front of you instead of behind. No time for the rail today.</p>
  <p>On the mainland side, you cross the short curved footbridge over the Gushan fishing port — small fishing boats below, nets drying, the water close enough to smell. Out past the harbor's narrow mouth, far away, the big ${vb('cranes')} of the real port stand against the sky; but here, over the little fishing harbor, everything is quiet and close. On the far side, a gentle uphill road leads you to the foot of the British ${vb('Consulate','consulate')}.</p>
  ${sysBox('\ud83d\udd17 LINK 4 of 5','The British Consulate',[
    ['flair','The mark is up at the consulate, on the '+vb('headland','headland')+'.'],
    ['flair','But there are two ways up from here.']
  ])}
  <p>You reach a fork at the base. A steep stone staircase climbs straight up the hillside — fast, but hard on legs that have already done a lot today. Beside it, a gentler path winds up the slope the long way — easier, but it will cost you time, and the sun is lower now.</p>`,
 choices:[
   {t:'The steep stairs. Save time, spend legs.', go:'e4s13_steep'},
   {t:'The gentle path. Save legs, spend time.', go:'e4s13_gentle'}
 ]
},

e4s13_steep:{
 onEnter:()=>{ state.stamina = Math.max(8, state.stamina - 35); state.flags.e4_climb = 'steep'; grant('long_way_up'); },
 html:(st)=>`
  <p>You take the stairs — the steep, direct climb, the hard way up.</p>
  <p>It is honest work. Your legs are tired from the long day, and the steps keep coming. Halfway up, a small old voice says <i>stop, sit, you have done enough today.</i> You do not stop. You shorten your steps, the way the late-night videos taught you, and climb one stair at a time. By the top you are ${vb('winded','winded')} and grinning, the harbor dropping away beneath you, wider and bluer with every step.</p>
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED','The Long Way Up',[
    ['flair','"You chose the steep stairs. The hard way up."'],
    ['pts','+5']
  ])}
  <p>You reach the top with time still on your side.</p>`,
 choices:[ {t:'Find the mark', go:'e4s14'} ]
},

e4s13_gentle:{
 onEnter:()=>{ state.stamina = Math.max(8, state.stamina - 12); state.flags.e4_climb = 'gentle'; },
 html:()=>`
  <p>You take the gentle path, winding up the green slope the long way. Your legs thank you — it is an easy grade, shaded in places, and you reach the top with energy to spare.</p>
  <p>But the climb ate time, and when you look west the sun has dropped noticeably. The dusk is closer than you would like. You will want to keep moving after this.</p>`,
 choices:[ {t:'Find the mark', go:'e4s14'} ]
},

e4s14:{
 html:()=>`
  <p>The consulate stands at the top of the headland, red brick and arched ${vb('verandas','verandas')}, looking out over the harbor mouth. No mark in the garden. No mark on the steps. Read the place.</p>
  ${sysBox('\ud83d\udd0d THE CONSULATE','Read it.',[
    ['flair','"No '+vb('peak','peak')+' was '+vb('claimed','claimed')+' to '+vb('chase','chase')+' the view;'],
    ['flair','They built to watch who '+vb('ventured','ventured')+' through."']
  ])}
  <p>You walk up into the old brick building. Inside, cool rooms full of glass cases, old photographs, a little souvenir shop — a hundred small things asking to be looked at. Outside, a long veranda runs along the edge of the headland, with benches and a low rail and a lot of empty sky.</p>
  <p>The marks have hidden indoors before. But the riddle is still in your ear: <i>they built to see one thing.</i></p>`,
 choices:[
   {t:'The lookout, facing the harbor mouth.', go:'e4s14_look'},
   {t:'Search the rooms and garden.', go:'e4s14_rooms'}
 ]
},

e4s14_look:{
 html:()=>`
  <p>You step out onto the veranda and walk to the rail, where the whole narrow mouth of the harbor opens below you — every ship that ever came or went, framed in one view. The mark blooms on the stone rail the moment you look out.</p>
  ${sysBox('\u2705 LINK 4 COMPLETE','Read correctly',[
    ['flair','Clean. Final link unlocked.']
  ])}`,
 choices:[ {t:'The last link', go:'e4s15'} ]
},

e4s14_rooms:{
 onEnter:()=>{ state.flags.chain_perfect = false; },
 html:()=>`
  <p>You wander the brick rooms and the garden, looking. Nothing glows. This building never cared about its rooms — it was built to watch the harbor mouth, and that is where its meaning sits.</p>
  ${sysBox('\u26a0 STUMBLE','You read the place wrong.',[
    ['flair','The chain holds \u2014 but a clean run is no longer possible.'],
    ['flair','Go to the lookout. Face the harbor mouth.']
  ],'fail')}
  <p>You step out to the lookout, face the water, and the mark is there — where it was always waiting. You move on, the sun lower with every minute.</p>`,
 choices:[ {t:'The last link', go:'e4s15'} ]
},

e4s15:{
 html:()=>`
  <p>You come back down off the headland and walk a short stretch toward the university, and there it is: the long curve of the Sizihwan ${vb('seawall','seawall')}, the place the whole city calls, simply, the sea wall. The sun is leaning low and gold over the water.</p>
  <p>The final link appears. You read it, then read it again, because it cannot be that simple.</p>
  ${sysBox('\ud83d\udd17 LINK 5 of 5','The sea wall',[
    ['flair','"'+vb('Turn your back','turn_your_back')+' upon the road;'],
    ['flair','Face the sea where sunsets '+vb('glowed','glowed')+'."'],
    ['flair','Then stop looking for marks \u2014 and just look.']
  ])}
  <p>The wall is long, and people sit all along it, facing every which way — some toward the water, some with their backs to it, looking instead at the university's pool and running track across the road behind. There is an open bench right beside you, facing inland. Your legs vote for it loudly.</p>
  <p>But the riddle waits, quiet: <i>the thing everyone here came to see.</i></p>`,
 choices:[
   {t:'Find a spot on the wall facing the open sea.', go:'e4s15_sea'},
   {t:'Drop onto the first open bench. You\u2019re exhausted.', go:'e4s15_bench'}
 ]
},

e4s15_bench:{
 onEnter:()=>{ state.flags.chain_perfect = false; },
 html:()=>`
  <p>You collapse onto the first bench you see, facing back toward the road and the city. You wait for the mark. Nothing comes.</p>
  ${sysBox('\u26a0 STUMBLE','You read the place wrong.',[
    ['flair','The chain holds \u2014 but a clean run is no longer possible.'],
    ['flair','Face where the sun goes. That is the whole point.']
  ],'fail')}
  <p>You get up, cross to the seaward side of the wall, and find a place looking straight out at the water — where the sun is going down. That, of course, is where the place wanted you all along.</p>`,
 choices:[ {t:'Sit. Watch.', go:'e4s16'} ]
},

e4s15_sea:{
 html:()=>`
  <p>You find a place on the seaward side of the wall, facing straight out at the open water where the sun is sinking. You sit. The mark blooms softly on the concrete beside you — and then, having shown itself, it fades, as if to say: <i>you found it; now you can stop looking.</i></p>`,
 choices:[ {t:'Just look', go:'e4s16'} ]
},

e4s16:{
 html:(st)=>`
  <p>So you do. You stop looking for marks, and you just look.</p>
  <p>The sun touches the sea. The water goes from blue to ${vb('bronze')} to a soft burning orange, and the whole harbor — the ${vb('cranes')}, the ships, the far green hills — holds still inside the light. You think of the person who sat at a desk at 11:42 p.m. and could not remember the last time they laughed. That person could not have imagined this.</p>
  <p>You give the evening your full attention. All of it.</p>
  <p>The chain closes around you, soft and complete.</p>
  ${sysBox('\u2705 QUEST CHAIN COMPLETE','THE CITY RUN',[
    ['flair','5 of 5 links.'],
    ['pts','+100']
  ])}
  ${sysBox('\ud83c\udfc6 ACHIEVEMENT UNLOCKED','Just Watch',[
    ['flair','"The whole task was to stop."'],
    ['pts','+0 points']
  ])}
  ${st.flags.chain_perfect ? sysBox('\ud83c\udfc6 ACHIEVEMENT UNLOCKED','Unbroken',[
    ['flair','"Five links. Every place, read right. A clean run."'],
    ['pts','+30']
  ]) : `<p class="quiet">No "Unbroken" badge today. Somewhere back there you read a place wrong — a tower, a fort, a tunnel, a wall — and the clean run slipped away. The chain still closed. It just wasn't perfect. Next time, maybe.</p>`}
  <p>You do not look at the points right away. For once the number can wait, because you are busy doing the thing the number is only a record of — sitting on a warm sea wall, fully inside one orange minute of your one life.</p>
  <p>When you finally check Completion Vision, almost as an afterthought, you already know what it will say.</p>
  <p class="beat big">TODAY: 100%</p>`,
 onEnter:()=>{ pay('e4_chain',100); grant('just_watch'); if(state.flags.chain_perfect) grant('unbroken'); state.stamina = 100; },
 choices:[ {t:'The +??? reward', go:'e4s17'} ]
},

e4s17:{
 html:()=>`
  <p>The sun is half gone now, the sky bleeding pink into grey. And as the last light goes, the chain gives up its hidden reward — the <i>+???</i> that has been waiting since this morning.</p>
  <p>It is not points.</p>
  ${sysBox('🎁 CHAIN REWARD','Access granted',[
    ['flair','Access '+vb('granted','granted')+'.'],
    ['flair','The chain\'s true reward is not a number. It is a place.']
  ])}
  <p>A new mark lights up on your map — not the gold point, which still waits in its fog to the south, but a quiet <b>silver</b> mark, close by, just along the coast from where you sit.</p>
  <p>The system wants you to go there. After a whole day of running, it has one more place to show you.</p>
  <p>You get up off the seawall, legs ${vb('stiff')}, and follow the silver mark into the blue evening.</p>`,
 choices:[ {t:'Follow the silver mark', go:'e4s18'} ]
},

e4s18:{
 html:()=>`
  <p>The mark leads you off the main path, down a quiet ${vb('stretch')} of coast where the streetlights have not all come on yet. To a wall.</p>
  <p>Just an old concrete wall, facing the sea. And on it, painted at shoulder height—</p>
  <p>the trophy.</p>
  <p>The same shape that blooms in your vision every time you unlock something. The same one on the warehouse wall in Yancheng. The same one, you are suddenly certain, in the corner of a sixty-year-old photograph in an old man's apartment.</p>
  <p>The same hand. You know it now, the way you know handwriting.</p>
  <p>But this time, the words next to it are not covered. This time they are right there, ${vb('scribbled','scribbled')} fast and hard, pressed deep into the paint like the writer was in a hurry, or afraid:</p>`,
 choices:[ {t:'Read the words', go:'e4s19'} ]
},

e4s19:{
 html:()=>`
  <p>Five words. All capitals. Underlined twice.</p>
  ${sysBox('🧱 ON THE WALL','( not from the system )',[
    ['flair','DON\'T TAKE THE GOLD QUEST.']
  ],'gold')}
  <p>You stand very still in the dark.</p>
  <p>The gold quest. The gold point, deep in the fog to the south, that you have tapped a hundred times. The one the system keeps locked behind a level you do not yet have. The one it told you, just last night, you are getting <i>closer</i> to.</p>
  <p>All this time you thought the gold point was the prize. The top of the mountain. The reason for all of it.</p>
  <p>And here, on a wall by the sea, in handwriting that is not the system's neat green but a real human ${vb('scrawl')} — someone who came before you, someone who painted these trophies all over the city, someone who reached a high enough level to <i>find</i> this gold quest—</p>
  <p class="beat">left a ${vb('warning','warning')} for whoever comes next.</p>
  <p>Don't.</p>`,
 onEnter:()=>{ state.flags.warning_seen = true; grant('the_warning'); },
 choices:[ {t:'Ask the system', go:'e4s20'} ]
},

e4s20:{
 html:()=>`
  <p>"What is the gold quest?" you ask the evening air. "Who wrote this? What happens if I take it?"</p>
  <p>The system, which gives you points for trying new lunches and counts the nods of security guards, which knows your completion percentage going back five years —</p>
  <p>says nothing at all.</p>
  <p>Its silence has a shape tonight. Not the patient silence of <i>the road will still be there tomorrow.</i> A different silence. The silence of a door that someone, somewhere, decided not to open for you.</p>
  <p>You take a photo of the wall. The trophy. The five words. You do not know what you will do with it. You just know you do not want to lose it.</p>`,
 choices:[ {t:'Go home', go:'e4s21'} ]
},

e4s21:{
 html:()=>`
  <p>You walk home through the warm dark, and for the first time since the convenience store, you open no quests, check no map, chase no points. You just walk, carrying two things in your pockets that do not fit together:</p>
  <p>A locked record from <i>before</i> the system found you.</p>
  <p>And a warning, painted by a stranger, telling you not to reach the one thing the system is leading you toward.</p>
  <p>The day was perfect. 100%. Level 5. The whole city open. And somehow you are walking home with more questions than you woke up with.</p>`,
 choices:[ {t:'Home. The gold point.', go:'e4s22'} ]
},

e4s22:{
 html:(st)=>`
  <p>In bed, you open the panel one last time. Level 5 sits there, solid and earned. The city glows, all of it yours now — except that one stubborn patch of fog in the south.</p>
  <p>You tap the gold point. You already know what it will say.</p>
  ${sysBox('❓ ???','[ Locked ]',[
    ['flair','Level required: ???'],
    ['flair','Closer.']
  ],'gold')}
  <p>Closer. You are level 5 now, and climbing. Every quest, every link, every new street walks you one step nearer to that gold light.</p>
  <p>And someone painted five hard words on a wall to stop you.</p>
  <p>You lie in the dark, and the old question — <i>what will tomorrow's quest be?</i> — has changed shape. Tonight the question is quieter, and colder, and you are not sure you want the answer:</p>
  <p class="beat big">What is waiting in the gold?</p>`,
 choices:[ {t:'EPISODE COMPLETE — open the Menu', go:'end4'} ]
},

/* =====================================================
   ENGINE
   ===================================================== */
const app = document.getElementById('app');

function go(id){
  if(id==='__title'){ renderTitle(); return; }
  if(id==='__replay'){
    state = freshState();
    save();
    go('s1'); return;
  }
  if(id==='__replay1'){ replayEpisode(1,'s1'); return; }
  if(id==='__replay2'){ replayEpisode(2,'e2s1'); return; }
  if(id==='__replay3'){ replayEpisode(3,'e3s1'); return; }
  if(id==='__replay4'){ replayEpisode(4,'e4s1'); return; }
  const sec = SECTIONS[id];
  if(!sec) return;
  state.section = id;
  if(sec.onEnter) sec.onEnter(state);
  save();
  render(sec);
  window.scrollTo({top:0, behavior:'auto'});
}

function render(sec){
  const html = (typeof sec.html==='function') ? sec.html(state) : sec.html;
  let ch = (typeof sec.choices==='function') ? sec.choices(state) : sec.choices;
  let btns = '';
  (ch||[]).forEach((c,i)=>{
    btns += '<button class="choice" data-i="'+i+'"><span class="arrow">▸</span>'+c.t+'</button>';
  });
  app.innerHTML = '<div class="scene">'+html+'</div><div class="choices">'+btns+'</div>';
  (ch||[]).forEach((c,i)=>{
    app.querySelector('[data-i="'+i+'"]').onclick = ()=>{
      if(c.set){ Object.assign(state.flags, c.set); }
      go(c.go);
    };
  });
  if(sec.onRender) sec.onRender();
}

/* vocab tooltip toggling (event delegation) */
document.addEventListener('click', (e)=>{
  const v = e.target.closest('.vb');
  document.querySelectorAll('.vb.open').forEach(x=>{ if(x!==v) x.classList.remove('open'); });
  if(v){
    v.classList.toggle('open');
    if(v.classList.contains('open')){
      const tip = v.querySelector('.tip');
      tip.style.left = '0px';
      tip.classList.remove('below');
      requestAnimationFrame(()=>{
        const r = tip.getBoundingClientRect();
        const overR = r.right - (window.innerWidth - 8);
        if(overR > 0) tip.style.left = (-overR)+'px';
        const r2 = tip.getBoundingClientRect();
        if(r2.left < 8) tip.style.left = (parseFloat(tip.style.left) + (8 - r2.left))+'px';
        if(tip.getBoundingClientRect().top < 8) tip.classList.add('below');
      });
    }
    e.stopPropagation();
  }
});

/* ---------- title screen ---------- */

    btns += '<button class="choice" id="btnContinue"><span class="arrow">▸</span>Continue <span class="quiet">(EP'+existing.episode+' · '+existing.points+' points)</span></button>';
  }
  btns += '<button class="choice" id="btnNew"><span class="arrow">▸</span>New Game</button>';
  app.innerHTML = `
  <div class="title-wrap">
    <div class="title-eyebrow">AN INKQUEST GAMEBOOK</div>
    <h1 class="gametitle">ACHIEVEMENT UNLOCKED</h1>
    <div class="logo-stage">

          <stop offset="0"   stop-color="#4ee6a8" stop-opacity="0"/>
          <stop offset="0.5" stop-color="#4ee6a8" stop-opacity="0.5"/>
          <stop offset="1"   stop-color="#4ee6a8" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- ground line -->
      <g class="sky">
        <!-- ground line -->
