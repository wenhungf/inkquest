<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Achievement Unlocked — Episode 1: Tutorial</title>
<style>
  :root{
    --night:#0e1216;        /* Kaohsiung asphalt at 11 p.m. */
    --paper:#c9c4ba;        /* tired fluorescent warmth     */
    --dim:#8a857c;
    --hud:#4ee6a8;          /* system green                 */
    --hud-dim:#2a6e54;
    --gold:#e6b84e;
    --line:#222a31;
    --boxbg:#10181d;
  }
  html{ background:var(--night) !important; }
  body{
    background:var(--night) !important;
    color:var(--paper);
    margin:0;
    font-family:Georgia,'Noto Serif','Times New Roman',serif;
    font-size:1.06rem;
    line-height:1.75;
    -webkit-text-size-adjust:100%;
  }
  #app{ max-width:600px; margin:0 auto; padding:28px 22px 90px; }

  /* ---------- narrative ---------- */
  .scene p{ margin:0 0 1.1em; }
  .beat{ letter-spacing:.04em; }
  .quiet{ color:var(--dim); }
  .big{ font-size:1.3em; }

  /* ---------- system UI ---------- */
  .sys{
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:.86rem;
    line-height:1.6;
    border:1px solid var(--hud-dim);
    background:var(--boxbg);
    border-radius:6px;
    padding:14px 16px;
    margin:1.4em 0;
    color:var(--hud);
    box-shadow:0 0 18px rgba(78,230,168,.07);
    animation:sysin .5s ease-out;
  }
  .sys .tag{ color:var(--hud); opacity:.7; font-size:.72rem; letter-spacing:.18em; display:block; margin-bottom:6px; }
  .sys .name{ font-weight:bold; font-size:1rem; }
  .sys .pts{ display:block; margin-top:6px; opacity:.9; }
  .sys .flair{ display:block; margin-top:6px; opacity:.75; font-style:italic; }
  .sys.gold{ border-color:#7a6328; color:var(--gold); box-shadow:0 0 18px rgba(230,184,78,.1); }
  .sys.fail{ border-color:#4a4a4a; color:#9a958c; box-shadow:none; }
  @keyframes sysin{
    from{ opacity:0; transform:translateY(6px); box-shadow:0 0 0 rgba(78,230,168,0); }
    to{ opacity:1; transform:none; }
  }
  @media (prefers-reduced-motion: reduce){
    .sys{ animation:none; }
  }

  /* ---------- panel / menu ---------- */
  .panel{
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    font-size:.88rem;
    border:1px solid var(--hud-dim);
    background:var(--boxbg);
    border-radius:6px;
    padding:16px;
    margin:1.4em 0;
    color:var(--hud);
  }
  .panel h3{ margin:0 0 10px; font-size:.78rem; letter-spacing:.2em; opacity:.7; font-weight:normal; }
  .panel .row{ display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px dotted #1c2930; }
  .panel .row:last-child{ border-bottom:none; }
  .panel .lock{ opacity:.45; }
  .panel .goldtxt{ color:var(--gold); }

  /* ---------- choices ---------- */
  .choices{ margin-top:2em; }
  .choice{
    display:block; width:100%; box-sizing:border-box;
    background:transparent; color:var(--paper);
    border:1px solid var(--line); border-radius:8px;
    font-family:inherit; font-size:1rem; line-height:1.5;
    text-align:left; padding:13px 16px; margin:10px 0;
    cursor:pointer; transition:border-color .15s, background .15s;
  }
  .choice:hover, .choice:focus-visible{ border-color:var(--hud-dim); background:#121a20; outline:none; }
  .choice:focus-visible{ box-shadow:0 0 0 2px var(--hud-dim); }
  .choice .arrow{ color:var(--hud); margin-right:8px; }

  /* ---------- vocab tooltips ---------- */
  .vb{
    border-bottom:1px dotted var(--hud);
    cursor:pointer; color:inherit;
    position:relative;
  }
  .vb .tip{
    display:none; position:absolute; left:0; bottom:1.6em; z-index:5;
    background:#16222a; color:#d7efe4; border:1px solid var(--hud-dim);
    border-radius:6px; padding:8px 11px;
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    font-size:.82rem; line-height:1.5;
    white-space:normal; width:max-content; max-width:min(300px,80vw);
    box-shadow:0 4px 16px rgba(0,0,0,.5);
  }
  .vb.open .tip{ display:block; }
  .vb .tip.below{ bottom:auto; top:1.6em; }

  /* ---------- title screen ---------- */
  .title-wrap{ text-align:center; padding-top:9vh; }
  .title-eyebrow{
    font-family:ui-monospace,'SF Mono',Menlo,monospace;
    font-size:.72rem; letter-spacing:.3em; color:var(--hud); opacity:.8;
  }
  h1.gametitle{
    font-size:2rem; line-height:1.2; margin:.5em 0 .2em; color:#efe9dc;
    font-weight:normal; letter-spacing:.02em;
  }
  .ep-label{ color:var(--gold); font-family:ui-monospace,Menlo,monospace; font-size:.8rem; letter-spacing:.2em; }
  .blurb{ margin:2.2em auto 2.6em; max-width:430px; text-align:center; }
  .blurb p{ margin:.4em 0; }
  .blurb .sysline{ font-family:ui-monospace,Menlo,monospace; color:var(--hud); }
  .menu-btns{ max-width:340px; margin:0 auto; }
  .small-note{ font-size:.78rem; color:var(--dim); margin-top:2.2em; }

  /* ---------- end-of-episode menu ---------- */
  .ach-list .row{ align-items:baseline; }
  .ach-name{ font-weight:bold; }
  .ach-desc{ display:block; font-size:.78rem; opacity:.65; font-style:italic; }
  .savebox{ width:100%; box-sizing:border-box; background:#0a0f12; color:var(--hud);
    border:1px solid var(--line); border-radius:6px; padding:10px;
    font-family:ui-monospace,Menlo,monospace; font-size:.74rem; min-height:60px; }
  .btn-line{ display:flex; gap:10px; }
  .btn-line .choice{ flex:1; }
  hr.sep{ border:none; border-top:1px solid var(--line); margin:2em 0; }

  /* ===== animated city-lights logo ===== */
  /* ---------- the animated logo ---------- */
  .logo-stage{
    width:100%; max-width:440px; margin:18px auto 6px;
    aspect-ratio: 440 / 150;
  }
  .logo-stage svg{ width:100%; height:100%; display:block; }

  /* city baseline + skyline strokes start grey, get lit by the sweep */
  .sky line, .sky path, .sky rect, .sky circle{
    stroke:#39434b;          /* grey, dormant */
    stroke-width:2;
    fill:none;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  /* children inside a lit group inherit the group's animated stroke */
  .sky g.lit line, .sky g.lit rect, .sky g.lit circle, .sky g.lit path{
    stroke: inherit;
  }

  /* the sweep bar */
  .sweep{
    fill:url(#sweepGrad);
    opacity:.9;
  }

  /* star badges pop in after their building lights */
  .star{
    fill:var(--hud);
    opacity:0;
    transform-box: fill-box;
    transform-origin: center;
  }

  .caption{
    font-family:ui-monospace,Menlo,monospace;
    font-size:.7rem; letter-spacing:.16em; color:var(--dim);
    margin-top:4px;
  }
  .controls{ margin-top:26px; }
  .controls button{
    background:transparent; color:var(--paper);
    border:1px solid var(--line); border-radius:8px;
    font-family:inherit; font-size:.9rem;
    padding:9px 16px; margin:0 6px; cursor:pointer;
  }
  .controls button:hover{ border-color:var(--hud-dim); }
  .note{ font-size:.74rem; color:var(--dim); margin-top:18px; line-height:1.6; }

  /* ===== TIMING =====
     Total loop = 13s.
     0–2.4s  sweep travels across (0–18.5%)
     ~9.7s   city lit and held green
     10.4–11s fade back to grey (80–84.6%)
     11–13s  FULL GREY HOLD (~2s) before the next sweep
  */
  .anim .sweep      { animation: sweepMove 13s linear infinite; }
  .anim .lit        { animation: litPulse 13s linear infinite; }
  .anim .star       { animation: starPop 13s linear infinite; }

  @keyframes sweepMove{
    0%    { transform: translateX(-90px); opacity:0; }
    1.5%  { opacity:.9; }
    16.5% { transform: translateX(470px); opacity:.9; }
    19%   { transform: translateX(520px); opacity:0; }
    100%  { transform: translateX(520px); opacity:0; }
  }

  /* lit: light on as the sweep passes, hold green, fade to grey by 84.6%,
     then stay grey through the ~2s quiet until the loop resets */
  @keyframes litPulse{
    0%, 7.9%   { stroke:#39434b; }        /* stay grey until the sweep has passed */
    9.2%       { stroke:var(--hud); }      /* then snap on, just behind the sweep */
    80%        { stroke:var(--hud); }      /* hold lit */
    84.6%      { stroke:#39434b; }         /* fade to grey */
    100%       { stroke:#39434b; }         /* FULL GREY HOLD ~2s */
  }

  @keyframes starPop{
    0%, 8%     { opacity:0; transform: scale(.4); }
    12%        { opacity:1; transform: scale(1.25); }
    15%        { opacity:1; transform: scale(1); }
    80%        { opacity:1; transform: scale(1); }
    84.6%      { opacity:0; transform: scale(.4); }   /* vanish WITH the buildings */
    100%       { opacity:0; transform: scale(.4); }   /* stay gone through grey hold */
  }

  @media (prefers-reduced-motion: reduce){
    .anim .sweep, .anim .lit, .anim .star{ animation:none; }
    .anim .lit{ stroke:var(--hud); }
    .anim .star{ opacity:1; }
  }
</style>
</head>

<script>
/* =====================================================
   ACHIEVEMENT UNLOCKED — Episode 1: Tutorial
   InkQuest · single-file build · EP append-ready
   ===================================================== */

const SAVE_KEY = 'au_save';
const SAVE_VERSION = 4;

function freshState(){
  return {
    version: SAVE_VERSION,
    episode: 1,
    section: 's1',
    points: 0,
    money: 0,
    level: 1,
    stamina: 100,
    skills: [],
    achievements: [],
    flags: {},
    map_unlocked: ['commute_route'],
    failCount: 0,
    epStart: {}
  };
}

let state = freshState();
let storageOK = true;

function loadSave(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(typeof s.version !== 'number') return null;
    /* future migrations go here: if(s.version < 2){...} */
    return Object.assign(freshState(), s);
  }catch(e){ storageOK = false; return null; }
}
function save(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
  catch(e){ storageOK = false; }
}
function snapshotEpisode(n){
  // store a deep copy of state at the moment this episode begins (minus the snapshots themselves)
  try{
    const copy = JSON.parse(JSON.stringify(state));
    delete copy.epStart;
    state.epStart = state.epStart || {};
    state.epStart[n] = copy;
    save();
  }catch(e){}
}
function replayEpisode(n, firstSection){
  // restore the snapshot for episode n, then jump to its first section
  try{
    const snap = state.epStart && state.epStart[n];
    if(!snap){ go(firstSection); return; }
    const keepSnaps = state.epStart;
    state = JSON.parse(JSON.stringify(snap));
    state.epStart = keepSnaps; // preserve all snapshots across replays
    save();
  }catch(e){}
  go(firstSection);
}
function wipeSave(){
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
}

function grant(id){
  if(!state.achievements.includes(id)){
    state.achievements.push(id);
    state.points += ACH[id].pts;
  }
}
function addPts(n){ state.points += n; }
function pay(flag, n){ if(!state.flags[flag]){ state.flags[flag] = true; addPts(n); } }
function earn(flag, nt){ if(!state.flags[flag]){ state.flags[flag] = true; state.money += nt; } }

function tipTxt(k){ return VOCAB[k].en + '<br><span style="opacity:.75">'+VOCAB[k].zh+'</span>'; }
function vb(word, key){
  const k = key || word.toLowerCase();
  return '<span class="vb" data-v="1">'+word+'<span class="tip">'+tipTxt(k)+'</span></span>';
}

/* ---------- UI builders ---------- */
function sysBox(tag, name, lines, cls){
  let h = '<div class="sys '+(cls||'')+'"><span class="tag">'+tag+'</span><span class="name">'+name+'</span>';
  (lines||[]).forEach(l=>{ h += '<span class="'+l[0]+'">'+l[1]+'</span>'; });
  return h+'</div>';
}

  ${sysBox('❓ ???','[ Locked ]',[['flair','Level required: ???']],'gold')}
  <p>You tap it again. Same answer.</p>
  <p>You stare at the small gold light until your eyes hurt. Then you close the panel, lie down, and pull up the ${vb('blanket')}. Tomorrow is a work day. Reports. Emails. The elevator. The guard.</p>
  <p>But lying there in the dark, you notice you are thinking about something you have not thought about in years.</p>
  <p class="beat big">What will tomorrow's quest be?</p>`,
 choices:[ {t:'EPISODE COMPLETE — open the Menu', go:'end'} ]
},

/* ---------- end-of-episode menu ---------- */

end:{
 html:(st)=>{
   let achHtml = '';
   Object.keys(ACH).filter(id=>ACH[id].ep===1).forEach(id=>{
     const a = ACH[id];
     const got = st.achievements.includes(id);
     achHtml += '<div class="row"><span>'+
       (got ? '🏆 <span class="ach-name">'+a.name+'</span><span class="ach-desc">'+a.desc+'</span>'
            : '<span class="lock">🔒 ???</span>')+
       '</span><span>'+(got ? (a.pts>0?'+'+a.pts:'—') : '')+'</span></div>';
   });
   return `
  <p class="quiet">EPISODE 1 — TUTORIAL</p>
  ${sysBox('✅ EPISODE COMPLETE','Tutorial',[['flair','"The road will still be there tomorrow." — and so will you.']])}
  <div class="panel">
    <h3>PLAYER</h3>
    <div class="row"><span>Level</span><span>${st.level}</span></div>
    <div class="row"><span>Points</span><span>${st.points}</span></div>
    <div class="row"><span>Map</span><span>7% explored</span></div>
    <div class="row"><span class="goldtxt">???</span><span class="goldtxt">[ Locked ]</span></div>
  </div>
  <div class="panel ach-list">
    <h3>ACHIEVEMENTS (${st.achievements.filter(id=>ACH[id].ep===1).length}/${Object.keys(ACH).filter(id=>ACH[id].ep===1).length})</h3>
    ${achHtml}
  </div>
  <p class="quiet">Missing one? Some choices lead to different badges. The road will still be there…</p>
  <hr class="sep">
  <div class="panel">
    <h3>SAVE</h3>
    <p style="font-family:inherit;font-size:.8rem;opacity:.8;margin:0 0 8px;">
      Your progress saves automatically on this device.${storageOK?'':' (Saving is not available here — use Export to keep your progress.)'}
      Export a save code to keep it safe or move to another device.</p>
    <div class="btn-line">
      <button class="choice" id="btnExport">Export save</button>
      <button class="choice" id="btnImport">Import save</button>
    </div>
    <textarea class="savebox" id="saveBox" placeholder="Your save code appears here. Or paste a code and press Import." spellcheck="false"></textarea>
  </div>`;
 },
 choices:[
   {t:'▶ Continue to Episode 2', go:'e2s1'},
   {t:'↻ Replay Episode 1', go:'__replay1'},
   {t:'Back to title', go:'__title'}
 ],
 onRender:()=>{
   const box = document.getElementById('saveBox');
   document.getElementById('btnExport').onclick = ()=>{
     box.value = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
     box.select();
   };
   document.getElementById('btnImport').onclick = ()=>{
     try{
       const s = JSON.parse(decodeURIComponent(escape(atob(box.value.trim()))));
       if(typeof s.version !== 'number') throw 0;
       state = Object.assign(freshState(), s);
       save();
       box.value = 'Save imported ✓';
     }catch(e){ box.value = 'That code did not work. Check it and try again.'; }
   };
 }
},

/* =====================================================
   EPISODE 2 — DAILY QUESTS
   ===================================================== */

e2s1:{
 onEnter:()=>{ state.episode = 2; snapshotEpisode(2); },
 html:()=>`
  <p class="quiet">EPISODE 2 — ${vb('DAILY','daily')} QUESTS</p>
  <p>Monday, 6:58 a.m.</p>
  <p>You wake up two minutes before the alarm. That never happens.</p>
  <p>And the system is already waiting, floating patiently above your blanket like a cat that wants breakfast.</p>
  ${sysBox('📋 DAILY QUESTS — MONDAY','Three small things',[
    ['flair','① Eat something new for lunch.'],
    ['flair','② Learn one '+vb('stranger','stranger')+"'s name."],
    ['flair','③ Spend 30 minutes in a place you have never stayed.'],
    ['pts','+5 each · '+vb('Bonus','bonus')+': all three = +10']
  ])}
  <p>Three tasks. Fifteen points. Twenty-five with the bonus.</p>
  <p>A week ago, your Monday plan was: survive until Friday.</p>
  <p>You like this plan better.</p>`,
 choices:[ {t:'Start the day', go:'e2s2'} ]
},

e2s2:{
 html:()=>`
  <p>Task one falls at lunch.</p>
  <p>For five years, lunch has been the same beef noodle shop or the same convenience store ${vb('bento')}. Today you stand in front of a small shop you have passed a hundred times: a ${vb('Vietnamese','vietnamese')} place, steam on the windows, a menu you cannot fully read.</p>
  <p>You point at something. The owner smiles and shouts at the kitchen.</p>
  <p>What arrives is a bowl of noodles with ${vb('herbs')} you cannot name, a soup that tastes like lemons and morning, and a fried ${vb('spring roll','spring_roll')} the size of your wrist.</p>
  ${sysBox('✅ DAILY ① COMPLETE','Something New',[['pts','+5']])}
  <p class="quiet">Your life's new high score: a different lunch. Five points. You decide not to think too hard about what that says about the old high score.</p>`,
 onEnter:()=>{ pay('e2_d1',5); },
 choices:[ {t:'Afternoon. Task two.', go:'e2s3'} ]
},

e2s3:{
 html:()=>`
  <p>Task two is harder than it sounds.</p>
  <p><i>Learn one stranger's name.</i></p>
  <p>You make a list in your head. The breakfast shop owner from last week. The convenience store ${vb('clerk')} with the name tag. And…</p>
  <p>The security guard.</p>
  <p>Five years. Two nods a day. Around 2,400 nods, if anyone is counting.</p>
  <p>Someone is counting. You have seen the counter.</p>
  <p>Your heart does a strange small jump — and you notice it. <i>Why is this scary? It is one question.</i></p>`,
 choices:[
   {t:'The breakfast shop owner. Easy mode.', go:'e2s4a'},
   {t:'The clerk with the name tag. Easier mode.', go:'e2s4b'},
   {t:'The guard. No more nodding.', go:'e2s4g'}
 ]
},

e2s4a:{
 html:()=>`
  <p>After work, you walk to the alley. The breakfast shop is closing, the old man ${vb('wiping')} the hot plate slowly, like he has all the time in the world.</p>
  <p>In Taiwan, you don't really ask a shop owner for their name. There are rules. So you do it the proper way.</p>
  <p>"Boss," you say. "May I ask your family name?"</p>
  <p>"Lin," he says, without looking up. Then he looks up. "You came back."</p>
  <p>"I came back, Boss Lin."</p>
  <p>He nods, like this settles something important.</p>
  ${sysBox('✅ DAILY ② COMPLETE','A Name (sort of)',[
    ['flair','Family name only. Partial data. …Accepted.'],
    ['pts','+5']
  ])}
  <p class="quiet">Even the system knows the rules of Taiwanese breakfast shops.</p>`,
 onEnter:()=>{ pay('e2_d2',5); },
 choices:[ {t:'Task three', go:'e2s5'} ]
},

e2s4b:{
 html:()=>`
  <p>On your way home, you stop at the convenience store. Same clerk as always. Tonight you finally look at the name tag.</p>
  <p><b>Kiwi.</b></p>
  <p>"Thank you… Kiwi," you say at the counter.</p>
  <p>Kiwi blinks, then grins. "Whoa. Five years, and today you learn to read?"</p>
  <p>Fair. Completely fair.</p>
  ${sysBox('✅ DAILY ② COMPLETE','A Name (printed)',[
    ['flair','Reading a name tag. Technically a success.'],
    ['pts','+5']
  ])}
  <p class="quiet">The system's tone is getting ruder. You kind of like it.</p>`,
 onEnter:()=>{ pay('e2_d2',5); },
 choices:[ {t:'Task three', go:'e2s5'} ]
},

e2s4g:{
 html:()=>`
  <p>You don't ${vb('hesitate')}. You walk straight to the lobby desk before your brain can vote.</p>
  <p>The guard looks up. Older than you. Tired eyes that miss nothing.</p>
  <p>"Excuse me," you say. "We see each other every day. For five years. I never asked your name."</p>
  <p>A long pause. The lobby clock ticks.</p>
  <p>"Sam," the guard says. And then, quieter: "Five years. You are the first one to ask."</p>
  <p>Something in your chest goes very ${vb('still','still_adj')}.</p>
  ${sysBox('✅ DAILY ② COMPLETE','The Person at the Desk',[['pts','+5']])}
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED','The Person at the Desk',[
    ['flair','"2,400 times. You finally asked."'],
    ['pts','+20']
  ])}
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED','No '+vb('Hesitation','hesitate'),[
    ['flair','"You picked the hard one first."'],
    ['pts','+0 points']
  ])}
  <p>Another zero. By now you can read this system's strange language: the zeros are the ones it respects.</p>`,
 onEnter:()=>{ pay('e2_d2',5); pay('e2_guard',20); grant('person_at_desk'); grant('no_hesitation'); state.flags.guard_name_known = true; },
 choices:[ {t:'Task three', go:'e2s5'} ]
},

e2s5:{
 html:()=>`
  <p>Task three: thirty minutes in a place you have never stayed.</p>
  <p>You pick the small park by the water, ten minutes from your apartment. You have walked past it maybe a thousand times. You have never once sat down in it.</p>
  <p>You sit down in it.</p>
  <p>For the first five minutes, your hands keep reaching for your phone. For the next ten, you watch an old man do slow exercises like he is fighting an ${vb('invisible')}, very polite enemy. For the last fifteen, you just… sit. The water moves. The sky changes color twice.</p>
  <p>Thirty minutes. It feels like a small vacation in the middle of an ordinary Monday.</p>
  ${sysBox('✅ DAILY ③ COMPLETE','Thirty Minutes',[['pts','+5']])}
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED','Three for Three',[
    ['flair','"All daily quests in one day. Look at you."'],
    ['pts','+10 '+vb('bonus','bonus')]
  ])}`,
 onEnter:()=>{ pay('e2_d3',5); grant('three_for_three'); },
 choices:[ {t:'Tuesday', go:'e2s6'} ]
},

e2s6:{
 html:()=>`
  <p class="quiet">TUESDAY</p>
  <p>The week finds a ${vb('rhythm')}.</p>
  <p>New lunch: +5. A different road home: +5. Thirty minutes on the office roof you didn't know was open: +5.</p>
  <p>Small numbers. They keep adding up anyway.</p>
  <p>At your desk, the report is still the report. But now there is a clock inside the day that only you can hear, and it is not counting down to the weekend. It is counting up.</p>`,
 onEnter:()=>{ pay('e2_tue',15); },
 choices:[ {t:'Wednesday', go:'e2s7'} ]
},

e2s7:{
 html:(st)=> st.flags.guard_name_known ? `
  <p class="quiet">WEDNESDAY</p>
  <p>The morning quest is short.</p>
  ${sysBox('📋 QUEST — WEDNESDAY','Again, With a Name',[
    ['flair','You know it now. Use it.'],
    ['pts','+1']
  ])}
  <p>Your chance comes that evening. Leaving work, you cross the lobby just as Sam arrives to start the night shift, settling in behind the desk for the long quiet hours.</p>
  <p>"Evening, Sam."</p>
  <p>Sam looks up — and for half a second, the tired eyes are not tired at all.</p>
  <p>"Evening."</p>
  <p>Exchange number 2,401. The first one with a name on it.</p>
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED','2,401',[['flair','"This time, with a name."'],['pts','+1']])}
  <p>You linger a moment at the desk. A name is a door. You could knock once more, or let it be.</p>` : `
  <p class="quiet">WEDNESDAY</p>
  <p>The system has noticed your easy-mode choice on Monday. Wednesday's quest arrives with a very specific address.</p>
  ${sysBox('📋 QUEST — WEDNESDAY','The Person at the Desk',[
    ['flair','You have seen this person about 2,400 times.'],
    ['flair','Learn their name.'],
    ['pts','+20']
  ])}
  <p>2,400 times.</p>
  <p>You read the number twice. The system has a talent for math that hurts.</p>`,
 onEnter:()=>{ if(state.flags.guard_name_known){ if(!state.achievements.includes('ach_2401')){ grant('ach_2401'); } } },
 choices:(st)=> st.flags.guard_name_known ?
   [ {t:'Stay. Talk a little more.', go:'e2s11a'},
     {t:'Let it be for today.', go:'e2s13'} ] :
   [ {t:'After work. The lobby.', go:'e2s8'} ]
},

e2s8:{
 html:()=>`
  <p>Six o'clock. The lobby is emptying out. The guard sits behind the desk, watching the door the way the guard has watched it for five years.</p>
  <p>You walk over. Your heart is doing something ${vb('embarrassing')}.</p>
  <p>This is the strange physics of it: talking to a true ${vb('stranger')} is easy. Talking to someone you have silently nodded at for five years — that is the hardest conversation in the world. The silence has weight now. Five years of weight.</p>
  <p>You stop at the desk. The guard looks up.</p>`,
 choices:[ {t:'"Excuse me. Can I ask you something?"', go:'e2s9'} ]
},

e2s9:{
 html:()=>`
  <p>"We see each other every day," you say. "For five years. Two nods a day. And I… I never asked your name. I'm sorry it took so long."</p>
  <p>A long pause. The lobby clock ticks. Somewhere above you, an elevator hums.</p>
  <p>"Sam," the guard says.</p>
  <p>And then, quieter, almost to the desk itself:</p>
  <p class="beat">"Five years. You are the first one to ask."</p>
  <p>Something in your chest goes very ${vb('still','still_adj')}.</p>
  <p>Two thousand four hundred nods, and this is the first exchange with a name on it. Number 2,401.</p>
  ${sysBox('✅ QUEST COMPLETE','The Person at the Desk',[['pts','+20']])}
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED','The Person at the Desk',[
    ['flair','"2,400 times. You finally asked."']
  ])}
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED','2,401',[['flair','"This time, with a name."'],['pts','+1']])}`,
 onEnter:()=>{ pay('e2_guard',20); grant('person_at_desk'); grant('ach_2401'); state.flags.guard_name_known = true; },
 choices:[
   {t:'"Thank you, Sam." Leave it there.', go:'e2s11b'},
   {t:'Stay. Talk a little more.', go:'e2s11a'}
 ]
},

e2s11a:{
 html:()=>`
  <p>You stay. You ask about the ${vb('night shifts','night_shifts')} — Sam works them all, you've noticed.</p>
  <p>"Days are for taking care of someone," Sam says. That is all. The door of that sentence closes gently, and you do not knock again.</p>
  <p>Instead Sam tells you something else: there is a ${vb('back lane','back_lane')} behind this building that cuts straight to the MRT station. "Saves six minutes. Nobody uses it. People don't look."</p>
  <p>People don't look. You know a system that agrees.</p>
  <p>You ${vb('file the lane away','file_away')}. Somehow you are sure it will matter someday.</p>`,
 onEnter:()=>{ state.flags.guard_story = true; },
 choices:[ {t:'Home', go:'e2s13'} ]
},

e2s11b:{
 html:()=>`
  <p>"Thank you, Sam," you say. "Good night."</p>
  <p>"Good night."</p>
  <p>Two more words than the last 2,400 exchanges. It is enough. Some doors you open slowly.</p>`,
 choices:[ {t:'Home', go:'e2s13'} ]
},

e2s13:{
 html:()=>`
  <p class="quiet">THURSDAY · FRIDAY</p>
  <p>The numbers keep climbing.</p>
  <p>A lunch from a truck that only parks on Thursdays: +5. A staircase instead of the slow elevator, all eleven floors: +5, plus legs that complain all afternoon. Thirty minutes in the bookstore near the station, reading the first chapter of a novel you will probably never buy: +5.</p>
  <p>Your points pass one hundred sometime on Friday morning. There is no ${vb('fanfare')}. The system just lets the number sit there, ${vb('glowing')} quietly, like it always believed you would get here.</p>`,
 onEnter:()=>{ pay('e2_thufri',20); },
 choices:[ {t:'Friday afternoon', go:'e2s14'} ]
},

e2s14:{
 html:()=>`
  <p>Friday, 3 p.m. You are refilling your water bottle when a colleague appears beside you, coffee in hand, casual in the way that is never actually casual.</p>
  <p>"Hey. Can I ask you something weird?"</p>
  <p>"Sure."</p>
  <p>"You've been… different lately." The colleague studies you. "You disappear at lunch. You smile at nothing. Last Friday you skipped dinner with everyone. Are you okay? Or like — <i>too</i> okay?"</p>
  <p>The question is friendly. Mostly. Underneath it there is a small, careful distance, the kind people keep from things they don't understand.</p>`,
 choices:[
   {t:'Be honest. A little.', go:'e2s15a'},
   {t:'Laugh it off completely.', go:'e2s15b'}
 ]
},

e2s15a:{
 html:()=>`
  <p>You decide to be honest. You open your mouth to say it.</p>
  <p><i>I see floating windows. They give me quests. I got twenty points for learning the guard's name.</i></p>
  <p>The words line up… and refuse to come out. Somewhere between your chest and your mouth, they turn into something else.</p>
  <p>"I've just been… trying new things. Sleeping better. It's nothing."</p>
  <p>"Huh," says the colleague. "Well. It's a good look on you." And walks away.</p>
  <p>You stand there with your water bottle, understanding two things at once. One: you cannot tell anyone, even when you try. Two—</p>
  <p class="beat">You are becoming a person with a secret. And you are getting good at it.</p>`,
 choices:[ {t:'Saturday', go:'e2s16'} ]
},

e2s15b:{
 html:()=>`
  <p>"Too okay?" You laugh. "I started sleeping before midnight. Try it. It's a ${vb('cheat code','cheat_code')}."</p>
  <p>The colleague laughs too, satisfied, and walks away with the coffee.</p>
  <p>Easy. Smooth. The lie fit so well it didn't even feel like one.</p>
  <p>You stand there with your water bottle, and a quiet thought arrives uninvited:</p>
  <p class="beat">You are becoming a person with a secret. And you are getting good at it.</p>`,
 choices:[ {t:'Saturday', go:'e2s16'} ]
},

e2s16:{
 html:()=>`
  <p class="quiet">SATURDAY, 9:00 A.M.</p>
  <p>The system has been saving something for the weekend.</p>
  ${sysBox('🗺️ WEEKEND QUEST',vb('District','district')+' Unlock: Yancheng',[
    ['flair','Visit 5 marked points in Yancheng before '+vb('sunset','sunset')+'.'],
    ['pts','+30 · new district']
  ])}
  <p>Yancheng. The old heart of the city, down by the harbor. Your map shows five small lights scattered across it, and around them, the grey fog you have been wanting to push back for a week.</p>
  <p>You put on your shoes. The whole day stretches out in front of you, shaped exactly like a quest.</p>`,
 choices:[ {t:'First point', go:'e2s17'} ]
},

e2s17:{
 html:()=>`
  <p><b>Point one</b> is a wall. Just a wall — until you read the small ${vb('plaque')}. A movie theater stood here for fifty years. Then it didn't.</p>
  <p>An old man sees you reading and stops. "I watched my first movie there," he says, to you or to the wall, it is hard to tell. "${vb('Sword','sword')} fights. The whole street heard us cheering." He nods at the air and walks on.</p>
  <p>The system ${vb('pings','ping')} softly. One light down.</p>
  <p><b>Point two</b> is a street of gold shops — ${vb('jewelry')} stores with red signs, one after another, glass cases full of small suns. A shop auntie catches you staring and waves you in. You escape eight minutes later, slightly ${vb('dazed')}, having learned the daily gold price and the marriage status of her three sons.</p>
  <p>Two lights down.</p>`,
 onEnter:()=>{ pay('e2_pts12',10); },
 choices:[ {t:'Point three: the harbor', go:'e2s19'} ]
},

e2s19:{
 html:()=>`
  <p><b>Point three</b> sits by the water: an old ${vb('warehouse')}, brick and iron, the kind of building that remembers more than the city does.</p>
  <p>The marked spot is around the side, in a narrow gap between the warehouse and the sea wall. You squeeze in, the system pings — three lights down — and you turn to leave.</p>
  <p>That is when you see it.</p>
  <p>On the brick, at shoulder height: ${vb('spray paint','spray_paint')}.</p>
  <p>${vb('Graffiti','graffiti')} is not rare in a harbor city. This is not that.</p>
  <p>A ${vb('trophy')}. <i>The</i> trophy — the exact ${vb('icon')} that floats in your vision every time you unlock an achievement. The same shape. The same proportions. Painted on a real wall, by a real hand, ${vb('faded')} by real rain.</p>
  <p>You reach out and touch it. The paint is dry. It has been dry for a long time.</p>
  <p>The system, which has an opinion about everything, says nothing at all.</p>
  <p>Under the trophy there is a line of smaller writing — but someone has sprayed over it with grey paint. Covered it. On purpose.</p>
  <p>The sun is getting lower. Two more points to visit.</p>`,
 choices:[
   {t:'Photograph it. Finish the quest. Points first.', go:'e2s20a'},
   {t:'Forget the points. Study the wall.', go:'e2s20b'}
 ]
},

e2s20a:{
 html:()=>`
  <p>You take three photos and make yourself walk away. Mysteries keep. Sunsets don't.</p>
  <p><b>Point four</b> is the great ${vb('temple')} plaza, smoke and gold in the late light, a grandmother teaching a small child how to hold the incense properly — higher, higher, like that.</p>
  <p><b>Point five</b> is a coffee shop that opens only in the afternoons, run by a man who appears to be at war with the concept of menus. "Sit," he says. "I'll decide." The coffee he decides on is the best you have had all year.</p>
  <p>You step out as the sun touches the water.</p>
  ${sysBox('✅ WEEKEND QUEST COMPLETE','District Clear: Yancheng',[['pts','+30']])}
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED','District Clear: Yancheng',[
    ['flair','"Five points before sunset."']
  ])}
  <p>On your map, the fog over Yancheng dissolves like sugar in tea. A whole district, lit up and yours.</p>
  <p>But walking to the bus stop, your thumb keeps returning to the photos. The trophy. The covered line beneath it.</p>
  <p class="beat">Painted by a real hand. Whose?</p>`,
 onEnter:()=>{ pay('e2_clear',30); grant('district_clear'); if(!state.map_unlocked.includes('yancheng')) state.map_unlocked.push('yancheng'); },
 choices:[ {t:'Sunday', go:'e2s22'} ]
},

e2s20b:{
 html:()=>`
  <p>The sunset can wait. The points can wait. This wall has been waiting longer.</p>
  <p>You crouch and study the covered line up close. Whoever hid it used cheap grey spray, and grey paint loses to time: at the right angle, in the low gold light, the old letters push through like bones.</p>
  <p>Most of it is gone. But near the end, three characters survive:</p>
  <p class="beat big">…LV9…</p>
  <p>LV. Level.</p>
  <p class="beat">Level 9.</p>
  <p>You stand very still, while the meaning arrives in pieces. Levels belong to the system. The system belongs to you. You are the only one who—</p>
  <p>You are not the only one.</p>
  <p>Someone else has the system. Someone painted this — the trophy, a level, a message — on a wall in the real world, where only another player would ever understand it. And someone <i>else</i> covered it up.</p>
  <p>You are level 2. Whoever wrote this was level 9.</p>
  <p>The sun goes down while you stand there. The last two quest lights blink out, unvisited.</p>
  ${sysBox('QUEST INCOMPLETE','District Unlock: Yancheng',[
    ['flair','3 of 5 points visited. District unlocked anyway. You found something better.']
  ],'fail')}
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED','Off the Map',[
    ['flair','"You traded points for a question."'],
    ['pts','+0 points']
  ])}
  <p class="quiet">Zero points. The biggest zero so far.</p>`,
 onEnter:()=>{ pay('e2_partial',15); grant('off_the_map'); state.flags.graffiti_examined = true; if(!state.map_unlocked.includes('yancheng')) state.map_unlocked.push('yancheng'); },
 choices:[ {t:'Sunday', go:'e2s22'} ]
},

e2s22:{
 html:()=>`
  <p class="quiet">SUNDAY, 9:14 P.M.</p>
  <p>You are lying on your bed, pleasantly tired, your legs full of Yancheng, when the system ${vb('clears its throat','clears_throat')}. Not literally. But the box that appears has a certain ${vb('ceremony')} to it.</p>
  ${sysBox('⬆️ LEVEL 2','Points: 100+',[
    ['flair',vb('Skill','skill')+' '+vb('slot','slot')+' unlocked.']
  ])}
  ${sysBox('💠 NEW SKILL','Completion '+vb('Vision','vision'),[
    ['flair','See how much of your day you really lived.']
  ])}
  <p>You sit up.</p>
  <p>"Show me," you think.</p>`,
 onEnter:()=>{ state.level = 2; if(!state.skills.includes('completion_vision')) state.skills.push('completion_vision'); },
 choices:[ {t:'Today\'s number', go:'e2s23'} ]
},

e2s23:{
 html:(st)=>`
  <p>A single number rises in the dark, soft and green.</p>
  <p class="beat big">TODAY: 89%</p>
  <p>Eighty-nine percent of today, really lived. ${st.flags.e2_clear ?
    'The walk, the gold street auntie, the temple smoke, the coffee dictator, the wall by the sea.' :
    'The walk, the gold street auntie, the wall by the sea — and those three half-hidden letters you cannot stop seeing.'} It feels right. Today was a full cup.</p>
  <p>You look at the number for a while, warm with it.</p>
  <p>And then you do a dangerous thing. You ask a question you cannot un-ask.</p>
  <p>"What was my ${vb('average','average')}… before?"</p>
  <p>The system pauses. For the first time since it arrived, you could swear it hesitates — the way a doctor hesitates, or a friend with bad news.</p>
  <p>Then it answers.</p>`,
 choices:[ {t:'Look', go:'e2s24'} ]
},

e2s24:{
 html:()=>`
  <p class="beat big">BEFORE: 41%</p>
  <p>Forty-one percent.</p>
  <p>For five years, more than half of every day — the bigger half — just… passed. Unlived. The same road, the same lunch, the same nods without names. Days you cannot tell apart, because there was nothing in them to tell apart.</p>
  <p>The system doesn't say anything else. No joke this time. No ${vb('sass')}. It just lets the two numbers float there in the dark, side by side:</p>
  <p class="beat">41% &nbsp;→&nbsp; 89%</p>
  <p>It knew all along, you realize. It has been counting since before you could see it. It was just waiting for you to ask.</p>
  <p>You lie back down. You are not sad, exactly. It is the feeling of looking at an old photo of yourself and not ${vb('recognizing')} the person — except the photo is five years long.</p>`,
 choices:[ {t:'Monday is coming', go:'e2s25'} ]
},

e2s25:{
 html:(st)=>`
  <p>Before you sleep, you open the map one more time.</p>
  <p>Yancheng glows now, a whole new piece of the city, lit from inside. ${st.flags.graffiti_examined ?
    'By the harbor, where the warehouse stands, you have placed your own small mark — the first thing on this map the system didn\'t put there. <i>LV9,</i> you think. <i>Who are you? And who covered you up?</i>' :
    'By the harbor, your thumb hovers over the warehouse. The trophy in the photos. The covered line beneath it. Next weekend, you promise yourself. Next weekend you look closer.'}</p>
  <p>Deep in the fog to the south, the gold light waits, patient as ever.</p>
  <p>You close the panel. In the dark, you find yourself doing the math: Monday's three daily quests, plus whatever the week brings, plus the weekend…</p>
  <p>Level 3 is maybe ten days away.</p>
  <p>You fall asleep mid-calculation, smiling at the ceiling like an idiot.</p>
  <p class="beat">Best ${vb('Monday-eve','eve')} in five years.</p>`,
 choices:[ {t:'EPISODE COMPLETE — open the Menu', go:'end2'} ]
},

end2:{
 html:(st)=>{
   function achGroup(ep){
     let h='';
     Object.keys(ACH).filter(id=>ACH[id].ep===ep).forEach(id=>{
       const a=ACH[id]; const got=st.achievements.includes(id);
       h += '<div class="row"><span>'+
         (got ? '🏆 <span class="ach-name">'+a.name+'</span><span class="ach-desc">'+a.desc+'</span>'
              : '<span class="lock">🔒 ???</span>')+
         '</span><span>'+(got ? (a.pts>0?'+'+a.pts:'—') : '')+'</span></div>';
     });
     return h;
   }
   const c1=st.achievements.filter(id=>ACH[id].ep===1).length, t1=Object.keys(ACH).filter(id=>ACH[id].ep===1).length;
   const c2=st.achievements.filter(id=>ACH[id].ep===2).length, t2=Object.keys(ACH).filter(id=>ACH[id].ep===2).length;
   return `
  <p class="quiet">EPISODE 2 — DAILY QUESTS</p>
  ${sysBox('✅ EPISODE COMPLETE','Daily Quests',[['flair','41% → 89%. The counting continues.']])}
  <div class="panel">
    <h3>PLAYER</h3>
    <div class="row"><span>Level</span><span>${st.level}</span></div>
    <div class="row"><span>Points</span><span>${st.points}</span></div>
    <div class="row"><span>Skill</span><span>Completion Vision</span></div>
    <div class="row"><span>Map</span><span>14% explored</span></div>
    <div class="row"><span class="goldtxt">???</span><span class="goldtxt">[ Locked ]</span></div>
  </div>
  <div class="panel ach-list">
    <h3>EPISODE 2 ACHIEVEMENTS (${c2}/${t2})</h3>
    ${achGroup(2)}
  </div>
  <div class="panel ach-list">
    <h3>EPISODE 1 ACHIEVEMENTS (${c1}/${t1})</h3>
    ${achGroup(1)}
  </div>
  <p class="quiet">Missing some? Different choices, different badges. The wall is still there…</p>
  <hr class="sep">
  <div class="panel">
    <h3>SAVE</h3>
    <p style="font-family:inherit;font-size:.8rem;opacity:.8;margin:0 0 8px;">
      Your progress saves automatically on this device.${storageOK?'':' (Saving is not available here — use Export to keep your progress.)'}
      Export a save code to keep it safe or move to another device.</p>
    <div class="btn-line">
      <button class="choice" id="btnExport2">Export save</button>
      <button class="choice" id="btnImport2">Import save</button>
    </div>
    <textarea class="savebox" id="saveBox2" placeholder="Your save code appears here. Or paste a code and press Import." spellcheck="false"></textarea>
  </div>`;
 },
 choices:[
   {t:'▶ Continue to Episode 3', go:'e3s1'},
   {t:'↻ Replay Episode 2', go:'__replay2'},
   {t:'Back to title', go:'__title'}
 ],
 onRender:()=>{
   const box = document.getElementById('saveBox2');
   document.getElementById('btnExport2').onclick = ()=>{
     box.value = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
     box.select();
   };
   document.getElementById('btnImport2').onclick = ()=>{
     try{
       const sv = JSON.parse(decodeURIComponent(escape(atob(box.value.trim()))));
       if(typeof sv.version !== 'number') throw 0;
       state = Object.assign(freshState(), sv);
       save();
       box.value = 'Save imported ✓';
     }catch(e){ box.value = 'That code did not work. Check it and try again.'; }
   };
 }
},

/* =====================================================
   EPISODE 3 — SIDE QUEST
   ===================================================== */

e3s1:{
 onEnter:()=>{ state.episode = 3; snapshotEpisode(3); },
 html:()=>`
  <p class="quiet">EPISODE 3 — SIDE QUEST</p>
  <p>Saturday, 8:30 a.m. You wake up before the alarm again. This is who you are now, apparently.</p>
  <p>The panel is waiting, and this morning it has grown a new tab.</p>
  ${sysBox('💰 SIDE QUESTS — UNLOCKED','Real tasks. Real money.',[
    ['flair',vb('Payment','payment')+' '+vb('guaranteed','guaranteed')+' by the system.'],
    ['flair','⚠ Side quests are '+vb('optional','optional')+'.']
  ])}
  <p>You read it twice. Then a third time.</p>
  <p>Points are one thing. Points are made of light. But money? Money comes from somewhere. Money has a bank account behind it, and bank accounts have names.</p>
  <p><i>Guaranteed by the system.</i> Guaranteed how? By whom?</p>
  <p>You hold the question up to the light, turn it around… and then your eyes drift to the ${vb('pile')} of mail on your desk. The ${vb('rent notice','rent_notice')}. Last month's credit card bill. The washing machine that makes a new dying sound every week.</p>
  <p>The question loses.</p>`,
 choices:[ {t:'Open the quest list', go:'e3s2'} ]
},

e3s2:{
 html:()=>`
  <p>Three quests sit in the new tab.</p>
  ${sysBox('💰 SIDE QUESTS','Available',[
    ['flair','① Fix a '+vb('neighbor','neighbor')+"'s electric fan · NT$150"],
    ['flair','② Sell three things you no longer use · NT$800 ('+vb('est.','est')+')'],
    ['flair','③ '+vb('Delivery','deliver')+' to Cijin · NT$2,000'],
    ['flair','　 [ Locked — complete 2 side quests first ]']
  ])}
  <p>Two thousand. For one delivery. Your eyes keep walking back to it, and the lock icon stares back, patient as everything else in this system.</p>
  <p>Fine. Two quests first, then.</p>`,
 choices:[
   {t:'The fan. Practical things first.', go:'e3s3', set:{e3_pragmatic:true} },
   {t:'The selling. Time to let go of some stuff anyway.', go:'e3s3', set:{e3_declutter:true} }
 ]
},

e3s3:{
 html:(st)=>`
  <p>${st.flags.e3_pragmatic ?
    'Practical things first. Money is money, and the fan is forty steps away.' :
    'You decide to start the decluttering on Sunday, when you have the whole day. Which makes the fan today\'s job. Forty steps away.'}</p>
  <p>The neighbor is the auntie from the fourth floor — the one who waters the stair plants and knows everyone's schedule better than the building's security camera. Her old electric fan has stopped turning, and the repair shop quoted her more than a new fan costs.</p>
  <p>"You can fix it?" she asks, doubtful, holding the door half open.</p>
  <p><i>No,</i> you think. <i>Absolutely not. I have never fixed a fan in my life.</i></p>
  <p>You open your mouth to say so, and the system interrupts.</p>
  ${sysBox('💡 SKILL CHECK',vb('Buried','buried')+' Skills',[
    ['flair','You have watched 47 '+vb('repair','repair')+' videos at 2 a.m. instead of sleeping.'],
    ['flair','You know more than you think.']
  ])}
  <p>…Huh.</p>
  <p>It is not wrong. All those nights, all those videos of strangers fixing things in garages. You thought you were wasting time.</p>
  <p>"I can try," you say.</p>`,
 choices:[ {t:'Open the fan', go:'e3s4'} ]
},

e3s4:{
 html:()=>`
  <p>You take the fan apart on her ${vb('balcony')}, slow and careful, photographing every step like the videos taught you. The inside is a museum of ${vb('dust')}. You clean the motor. You check the wiring. And there — a blackened ${vb('fuse')}, dead as Monday morning.</p>
  <p>The hardware store downstairs has a new one for thirty dollars.</p>
  <p>You put everything back, plug it in, and press the switch.</p>
  <p>The fan turns. Then it turns faster. The auntie makes a sound like she has just seen a magic trick, which, to be fair, is roughly how you feel too.</p>
  <p>She presses NT$150 into your hand and refuses to take no. Then she adds two ${vb('mangoes','mango')} on top, which were not part of the deal, and closes the door before you can ${vb('argue')}.</p>
  ${sysBox('✅ SIDE QUEST COMPLETE','The Fan',[['pts','NT$150 paid · +10 points']])}
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED',vb('Side Hustler','side_hustler'),[
    ['flair','"First job done. First money earned."'],
    ['pts','+10']
  ])}
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED',vb('Handy','handy'),[
    ['flair','"47 videos at 2 a.m. finally '+vb('paid off','paid_off')+'."'],
    ['pts','+5']
  ])}
  <p>The system doesn't give you new skills, you realize, walking home with warm mangoes. It shows you the ones you ${vb('buried')}.</p>`,
 onEnter:()=>{ pay('e3_fan',10); earn('e3_fan_nt',150); grant('side_hustler'); grant('handy'); },
 choices:[ {t:'Sunday: the selling', go:'e3s5'} ]
},

e3s5:{
 html:()=>`
  <p>Sunday afternoon, you stand in the middle of your apartment and look at your life as if you were a stranger to it.</p>
  <p>The system helps. Above each thing you own, a small grey label floats — not a price. A date.</p>
  <p class="beat">LAST USED.</p>
  <p>The ${vb('guitar')} in the corner: <b>1,247 days ago.</b> The running shoes, bought in a January full of plans: <b>two runs, 980 days ago.</b> A box of university ${vb('textbooks','textbook')}: a date so old the label seems ${vb('embarrassed')} to show it.</p>
  <p>A month ago, those numbers would have hurt. Today you just look at them, the way you looked at 41%, and let them be true.</p>
  <p>You photograph the guitar, the shoes, half the books. You write honest descriptions. <i>${vb('Second-hand','second_hand')}. Barely used. Needs someone better than me.</i></p>
  <p>By Thursday they are all gone, carried off by strangers who wanted them more. The ${vb('transfers','transfer')} land one by one — and the quest, you notice, does not close until the last one arrives. <i>Sold</i> is not sold, says the system, until the money is in your hand. Thursday night, the last transfer lands, and the quest box finally turns green: NT$800 total.</p>
  ${sysBox('✅ SIDE QUEST COMPLETE','Letting Go',[['pts','NT$800 paid · +10 points']])}
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED','Letting Go',[
    ['flair','"1,247 days. You let it find new hands."'],
    ['pts','+0 points']
  ])}
  <p class="quiet">Zero points for the guitar. The system understands some sales are not about money.</p>`,
 onEnter:()=>{ pay('e3_sell',10); earn('e3_sell_nt',800); grant('letting_go'); },
 choices:[ {t:'The week rolls on', go:'e3s6'} ]
},

e3s6:{
 html:()=>`
  <p class="quiet">MONDAY — THURSDAY</p>
  <p>The week ${vb('rolls on','rolls_on')}. The daily quests keep their rhythm underneath everything, steady as a heartbeat. A new lunch here, a ${vb('borrowed')} staircase there, thirty minutes in places you keep being surprised ${vb('exist')}.</p>
  <p>The points climb. The lock on quest three is already gone — it vanished the moment your second side quest closed, without a sound, like it had only ever been waiting for that. Gold tier, open. But a NT$2,000 delivery across the water deserves a whole free day, not a tired weeknight. <i>Saturday,</i> you promise it. <i>Saturday.</i></p>
  <p>Almost ready. But first, Friday morning has a different plan for you.</p>`,
 onEnter:()=>{ pay('e3_week',35); },
 choices:[ {t:'Friday morning', go:'e3s7'} ]
},

e3s7:{
 html:(st)=> st.flags.breakfast_shop_known ? `
  <p>Friday, 7:40 a.m. You turn into the alley for your egg pancake, already tasting it.</p>
  <p>The shop's metal door is only half open. No ${vb('griddle')} sound. No smell of ${vb('batter')}.</p>
  <p>Boss Lin is ${vb('crouched')} on the doorstep with an old radio in pieces around him — the radio that has played behind his counter every morning, probably since before you were born. He pokes at it with a ${vb('screwdriver')}, and his face says the radio is winning.</p>
  <p>You stand there. Out of habit, you wait for the system — for the soft green box, the quest name, the points.</p>
  <p>Nothing comes.</p>
  <p>No quest. No ${vb('reward','reward')}. The morning is just a morning, and an old man can't fix his radio.</p>
  <p>You think: <i>as long as that radio is winning, nobody is making my breakfast.</i> You think: <i>I just fixed a fan. My hands still remember.</i></p>
  <p>Neither thought is ${vb('noble')}. Both are true.</p>
  <p>You crouch down next to him. "Boss, let me look."</p>` : `
  <p>Friday, 11:50 p.m. You stop at the convenience store on the way home, the way you have a thousand times.</p>
  <p>Kiwi is at the counter, fighting a losing war with a box of ${vb('expiring')} rice balls — store rules say they go in the trash at midnight, every one of them.</p>
  <p>You stand there. Out of habit, you wait for the system — for the soft green box, the quest name, the points.</p>
  <p>Nothing comes. The system, apparently, does not consider rice balls its department.</p>
  <p>"Ten minutes left," Kiwi says, ${vb('deadpan')}, sliding one across the counter. "Help me out. You'd be doing the planet a favor."</p>
  <p>You buy two more. The three of you — you, Kiwi, and the doomed rice balls — share a strange, small midnight ceremony at the counter. Kiwi tells you which flavors are actually good. The list is short and ${vb('brutally')} honest.</p>`,
 choices:(st)=> st.flags.breakfast_shop_known ?
   [ {t:'The radio', go:'e3s8'} ] :
   [ {t:'Midnight passes', go:'e3s8'} ]
},

e3s8:{
 html:(st)=> st.flags.breakfast_shop_known ? `
  <p>The radio is older than it looks, and it looks old. But the videos at 2 a.m. covered stranger machines than this, and your hands have started to trust themselves.</p>
  <p>Inside, a connection has come loose — one tired ${vb('joint')}, after thirty years of morning music. You hold it steady. You ask Boss Lin for ${vb('electrical tape','electrical_tape')}, and he produces, from somewhere, exactly the right kind.</p>
  <p>The radio ${vb('crackles','crackle')}. Then it sings — some old song, ${vb('mid-chorus','mid_chorus')}, as if it had been singing the whole time and just needed someone to listen.</p>
  <p>Boss Lin doesn't thank you. He looks at the radio for a moment, then at you, then turns and fires up the griddle without a word.</p>
  <p>The next morning, there is an extra egg in your pancake. You didn't order it. You don't pay for it. It is simply there — and it is there every morning after.</p>
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED',vb('Off the Clock','off_the_clock'),[
    ['flair','"No quest. No points. You did it anyway."'],
    ['pts','+0 points']
  ])}
  <p>The biggest rewards in this city, you are starting to learn, never show up on the panel.</p>` : `
  <p>At midnight Kiwi sweeps the last unsold rice balls into the bin with a small ${vb('funeral')} nod, and you head home with your three.</p>
  <p>The next night, when you stop by, there is a rice ball waiting on the counter before you even reach it — the good flavor, the one from the top of the brutally honest list.</p>
  <p>"On me," Kiwi says, not looking up from the ${vb('register')}. "Planet-saver discount."</p>
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED',vb('Off the Clock','off_the_clock'),[
    ['flair','"No quest. No points. You did it anyway."'],
    ['pts','+0 points']
  ])}
  <p>The biggest rewards in this city, you are starting to learn, never show up on the panel.</p>`,
 onEnter:()=>{ grant('off_the_clock'); if(state.flags.breakfast_shop_known) state.flags.helped_boss_lin = true; },
 choices:[ {t:'Saturday. The third quest.', go:'e3s9'} ]
},

e3s9:{
 html:()=>`
  <p class="quiet">SATURDAY, 10:00 A.M.</p>
  <p>The lock is gone. Quest three opens like a door.</p>
  ${sysBox('📦 SIDE QUEST — GOLD TIER','The Box',[
    ['flair','Pick up: '+vb('locker','locker')+' 17, Gushan '+vb('Ferry','ferry')+' '+vb('Pier','pier')+'.'],
    ['flair','Deliver to: an address on Cijin. Before sunset.'],
    ['flair','Payment: NT$2,000'],
    ['flair','Task rating: '+vb('HARMLESS','harmless')]
  ])}
  <p><i>Task rating.</i></p>
  <p>You stop on that line. You have never seen a task rating before. And a rating only exists if the thing it rates can vary.</p>
  <p class="beat">Which means somewhere in this system, there are tasks that are not harmless.</p>
  <p>You file that thought away with the others, take the MRT to Gushan, and find locker 17 in the corner of the ferry building, breathing in the smell of sea and engine oil.</p>
  <p>The system feeds you the code. The locker clicks open.</p>`,
 choices:[ {t:'Look inside', go:'e3s10'} ]
},

e3s10:{
 html:()=>`
  <p>Inside sits an old cookie ${vb('tin')} — the round kind, red and gold, the pattern worn soft by years of hands. It is tied shut with brown ${vb('rope')}, ${vb('knotted')} twice, carefully.</p>
  <p>You lift it. Lighter than it looks. Something inside ${vb('shifts')} with a papery whisper.</p>
  <p>No sender name. No note. Just an address on the lid, written small, and a ferry to catch.</p>
  <p>You buy your token and walk onto the boat with the scooters and the bicycles and the Saturday families, the tin under your arm like a secret you haven't read yet.</p>`,
 choices:[ {t:'Cross the water', go:'e3s11'} ]
},

e3s11:{
 html:()=>`
  <p>The ferry pulls out, and Kaohsiung opens up behind you.</p>
  <p>You stand at the ${vb('rail')} of the upper ${vb('deck')}. The harbor water is green-grey and busy, folding into white ${vb('foam')} along the ${vb('hull')}. ${vb('Container ships','container_ships')} sit in the distance like sleeping buildings. The wind is full of salt, and it gets into everything — your hair, your jacket, the small serious conversations of children pointing at waves.</p>
  <p>Ten minutes, shore to shore. It feels longer, the good kind of longer.</p>
  <p>On your map, in the corner of your eye, the fog over Cijin is dissolving as the island comes closer — as if the boat itself were ${vb('wiping')} the world clean.</p>
  <p>The ferry bumps home. Scooters start around you like a small thunderstorm.</p>
  <p>You step onto Cijin.</p>`,
 onEnter:()=>{ if(!state.map_unlocked.includes('cijin')) state.map_unlocked.push('cijin'); },
 choices:[ {t:'Find the address', go:'e3s12'} ]
},

e3s12:{
 html:()=>`
  <p>The address leads you away from the beach crowds and the seafood streets, into the back lanes where the island keeps its real life — laundry drying on every ${vb('balcony')}, temple smoke, old walls patched with five colors of cement.</p>
  <p>Halfway there, you feel it: the rope has loosened. One knot has worked itself free, and the ${vb('lid')} of the tin sits slightly, invitingly open.</p>
  <p>You stop in the empty lane.</p>
  <p>Two thousand dollars, for carrying a box across the water. No sender. No name. <i>Task rating: harmless.</i> Says who?</p>
  <p>Nobody would know. One ${vb('peek')}. The lane is empty, and the lid is right there.</p>`,
 choices:[
   {t:'Retie the rope. It\'s not yours to open.', go:'e3s13a'},
   {t:'Look. You\'re carrying it — you have a right to know.', go:'e3s13b'}
 ]
},

e3s13a:{
 html:()=>`
  <p>You pull the rope tight and retie the knot, double, the way it was.</p>
  <p>Whatever is in there belongs to whoever is waiting for it. Some boxes are not questions. Some boxes are just boxes that need to arrive.</p>
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED','Not Yours to Open',[
    ['flair','"Some boxes are not questions."'],
    ['pts','+0 points']
  ])}
  <p class="quiet">Another zero. Your collection of zeros is becoming the most valuable thing you own.</p>`,
 onEnter:()=>{ grant('not_yours'); },
 choices:[ {t:'Deliver it', go:'e3s14'} ]
},

e3s13b:{
 html:()=>`
  <p>You lift the lid.</p>
  <p>Photographs. A whole tin of them — black and white at the bottom, faded color on top, all of one place: an old house with a courtyard, and a ${vb('longan')} tree growing through every decade of pictures. A family stands in front of it again and again, changing sizes, changing decades, the tree growing while the grown-ups grey.</p>
  <p>On the back of the top photo, someone has written a date and a few small words — the year, and something about the day the house was finished. The writing is in small, careful ${vb('strokes')}, the kind a person uses when they know the paper will ${vb('outlive')} them.</p>
  <p>You stand in the lane for a long moment, holding sixty years of someone's life in a cookie tin.</p>
  <p>Then you put the lid back, and tie the rope, double. Your hands do it slowly. The two thousand dollars feels different in your head now — smaller, somehow, and heavier.</p>
  <p>The system says nothing. Some weights it lets you carry yourself.</p>`,
 onEnter:()=>{ state.flags.box_opened = true; },
 choices:[ {t:'Deliver it', go:'e3s14'} ]
},

e3s14:{
 html:()=>`
  <p>The address is a thin old ${vb('apartment block','apartment_block')} two lanes from the water, the kind with a ${vb('steep')} stair and a different potted plant on every step.</p>
  <p>You knock. ${vb('Shuffling','shuffling')} inside. The door opens on an old man — small, neat, a ${vb('cardigan')} despite the heat. Old Mr. Hong, says the name by the doorbell.</p>
  <p>He sees the tin under your arm, and his hands, resting on the door frame, ${vb('tremble','trembled')} once.</p>
  <p>"It came," he says. Not to you, exactly. To the tin.</p>
  <p>He invites you in before you can refuse, sits you down, and unties the rope with the slow care of a man ${vb('defusing')} something precious. The lid comes off. The photographs look up at him.</p>
  <p>He is quiet for a long time.</p>`,
 choices:[ {t:'Wait', go:'e3s15'} ]
},

e3s15:{
 html:()=>`
  <p>"Our old house," he says at last, turning the photos one by one. "Sea-sand concrete. They ${vb('demolished','demolished')} the whole row, years ago. Everything went — except a neighbor took the photos, and then the neighbor moved, and then…" He waves a hand at the long journey of the tin. "And then, today, you."</p>
  <p>He turns another photo and stops.</p>
  <p>The ${vb('longan')} tree fills the frame, heavy with fruit, a ladder leaning against it and children mid-climb.</p>
  <p class="beat">"My father planted it," he says. And nothing else, for a while.</p>
  <p>You sit with him in the kind of silence that doesn't need fixing. Through the window, a ferry blows its ${vb('horn')}. Somewhere below, the sea is doing what it has always done.</p>`,
 choices:[ {t:'One more photo', go:'e3s16'} ]
},

e3s16:{
 onEnter:()=>{ state.flags.photo_noticed = true; },
 html:()=>`
  <p>He keeps turning photos, ${vb('narrating')} some, passing others in silence, and you are half lost in the rhythm of it when one photo crosses the table and something in the background catches you by the ${vb('throat')}.</p>
  <p>A brick wall, at the edge of the frame, behind a row of drying nets. And on the brick — blurred by distance, tilted by the camera, faded by sixty years of being a photograph —</p>
  <p>a painted shape.</p>
  <p>Your heart skips half a beat. You lean in, but the photo is already turning, already gone under the next one, and Old Mr. Hong is saying something about a typhoon year, and the moment closes like water.</p>
  <p>It couldn't be. The photo is decades old. Decades before you. Decades before any of this.</p>
  <p>You don't ask. You file the shape away, next to the other things you cannot explain — and the file is getting thick.</p>`,
 choices:[ {t:'Take your leave', go:'e3s17'} ]
},

e3s17:{
 html:()=>`
  <p>When you stand to ${vb('take your leave','take_your_leave')}, Old Mr. Hong tries to press money into your hand. You refuse — the job is paid, truthfully — and he gives up faster than the fourth-floor auntie did, which surprises you, until he disappears into the kitchen and returns with a plastic bag of ${vb('dried fish','dried')}, home-made, tied with the same brown rope as the tin.</p>
  <p>This, you understand, is not optional.</p>
  <p>"Come back when the ${vb('longans','longan')} are sweet," he says at the door, which makes no sense — the tree is decades gone — and perfect sense.</p>
  <p>You walk back toward the ferry in the late gold light, dried fish in one hand, the island warm around you.</p>
  ${sysBox('✅ SIDE QUEST COMPLETE','The Box',[
    ['pts','NT$2,000 paid · +25 points'],
    ['flair','⚠ Note: The previous '+vb('courier','courier')+' failed to complete this task.']
  ])}
  ${sysBox('🏆 ACHIEVEMENT UNLOCKED','Crossing',[
    ['flair','"Over the water, before sunset."'],
    ['pts','+20']
  ])}`,
 onEnter:()=>{ pay('e3_box',25); earn('e3_box_nt',2000); grant('crossing'); state.flags.courier_warning_seen = true; },
 choices:[ {t:'Read that note again', go:'e3s18'} ]
},

e3s18:{
 html:()=>`
  <p>You stop in the middle of the lane and read it again.</p>
  <p class="beat">The previous courier failed to complete this task.</p>
  <p>Previous. Courier.</p>
  <p>The tin has been trying to reach Old Mr. Hong for longer than today. Someone else held it before you — someone with a floating green panel and a quest box and a sunset deadline. Someone the system hired, the way it hired you.</p>
  <p>And that someone <i>failed.</i> How do you fail to carry a cookie tin across a harbor?</p>
  <p>You look back at the apartment block. The light is on in Old Mr. Hong's window, warm and small. You think of the wall in Yancheng. You think of a painted shape in a sixty-year-old photograph.</p>
  <p>"Who was it?" you ask the air. "What happened to them?"</p>
  <p>The system, which counts everything, answers nothing.</p>`,
 choices:[ {t:'The ferry home', go:'e3s19'} ]
},

e3s19:{
 html:(st)=>`
  <p class="quiet">SUNDAY, 10:30 P.M.</p>
  <p>You open the panel before bed, and it has been waiting for you with ceremony again.</p>
  ${sysBox('⬆️ LEVEL 3','Points: 220+',[
    ['flair','"Most people never ask what their hands can do."']
  ])}
  <div class="panel">
    <h3>PLAYER</h3>
    <div class="row"><span>Level</span><span>3</span></div>
    <div class="row"><span>Points</span><span>${st.points}</span></div>
    <div class="row"><span>Money</span><span>NT$${st.money.toLocaleString()}</span></div>
    <div class="row"><span>Next level</span><span>360</span></div>
  </div>
  <p>NT$2,950 this month, from a fan, a guitar, and a ferry ride. It will not change your life.</p>
  <p>But you look at the number and find you are not really thinking about the money. You are thinking: this month, you fixed two machines. You let go of 1,247 days. You crossed the water. You put a tree back in an old man's hands.</p>
  <p>The money is the scoreboard. It was never the prize.</p>`,
 onEnter:()=>{ state.level = 3; },
 choices:[ {t:'One last look at the quest history', go:'e3s20'} ]
},

e3s20:{
 html:()=>`
  <p>Before you sleep, a thought sends you into a corner of the panel you have never opened: the quest history. Every task since the beginning, ${vb('stacked')} like receipts.</p>
  <p>You scroll down, past the week, past Yancheng, past the guard and the alley, all the way to the bottom — to <i>A Different Road</i>, your first quest, the morning the world changed by three minutes.</p>
  <p>And there, underneath it — <i>before</i> it — sits one more line. Folded. Grey.</p>
  ${sysBox('🗂 QUEST HISTORY','[ Records before activation ]',[
    ['flair','1 entry — locked.']
  ],'fail')}
  <p>Before ${vb('activation')}.</p>
  <p>Before the convenience store. Before the first floating words. Before, as far as you knew, there was any system at all —</p>
  <p class="beat">something happened. And the system wrote it down.</p>
  <p>You tap the line. Locked. You tap it again, because that has always worked so well.</p>
  <p>Locked.</p>
  <p>You lie in the dark a long time that night, doing a new kind of math — not points, not levels. Just one question, over and over:</p>
  <p class="beat big">What does this system know about you that you don't?</p>`,
 choices:[ {t:'EPISODE COMPLETE — open the Menu', go:'end3'} ]
},

end3:{
 html:(st)=>{
   function achGroup(ep){
     let h='';
     Object.keys(ACH).filter(id=>ACH[id].ep===ep).forEach(id=>{
       const a=ACH[id]; const got=st.achievements.includes(id);
       h += '<div class="row"><span>'+
         (got ? '🏆 <span class="ach-name">'+a.name+'</span><span class="ach-desc">'+a.desc+'</span>'
              : '<span class="lock">🔒 ???</span>')+
         '</span><span>'+(got ? (a.pts>0?'+'+a.pts:'—') : '')+'</span></div>';
     });
     return h;
   }
   const cnt=(ep)=>[st.achievements.filter(id=>ACH[id].ep===ep).length, Object.keys(ACH).filter(id=>ACH[id].ep===ep).length];
   const [c3,t3]=cnt(3), [c2,t2]=cnt(2), [c1,t1]=cnt(1);
   return `
  <p class="quiet">EPISODE 3 — SIDE QUEST</p>
  ${sysBox('✅ EPISODE COMPLETE','Side Quest',[['flair','"The money is the scoreboard. It was never the prize."']])}
  <div class="panel">
    <h3>PLAYER</h3>
    <div class="row"><span>Level</span><span>${st.level}</span></div>
    <div class="row"><span>Points</span><span>${st.points}</span></div>
    <div class="row"><span>Money</span><span>NT$${st.money.toLocaleString()}</span></div>
    <div class="row"><span>Next level</span><span>360</span></div>
    <div class="row"><span>Map</span><span>20% explored</span></div>
    <div class="row"><span class="goldtxt">???</span><span class="goldtxt">[ Locked ]</span></div>
  </div>
  <div class="panel ach-list">
    <h3>EPISODE 3 ACHIEVEMENTS (${c3}/${t3})</h3>
    ${achGroup(3)}
  </div>
  <div class="panel ach-list">
    <h3>EPISODE 2 ACHIEVEMENTS (${c2}/${t2})</h3>
    ${achGroup(2)}
  </div>
  <div class="panel ach-list">
    <h3>EPISODE 1 ACHIEVEMENTS (${c1}/${t1})</h3>
    ${achGroup(1)}
  </div>
  <p class="quiet">Missing some? Different choices, different badges. The locker is still there…</p>
  <hr class="sep">
  <div class="panel">
    <h3>SAVE</h3>
    <p style="font-family:inherit;font-size:.8rem;opacity:.8;margin:0 0 8px;">
      Your progress saves automatically on this device.${storageOK?'':' (Saving is not available here — use Export to keep your progress.)'}
      Export a save code to keep it safe or move to another device.</p>
    <div class="btn-line">
      <button class="choice" id="btnExport3">Export save</button>
      <button class="choice" id="btnImport3">Import save</button>
    </div>
    <textarea class="savebox" id="saveBox3" placeholder="Your save code appears here. Or paste a code and press Import." spellcheck="false"></textarea>
  </div>`;
 },
 choices:[
   {t:'▶ Continue to Episode 4', go:'e4s1'},
   {t:'↻ Replay Episode 3', go:'__replay3'},
   {t:'Back to title', go:'__title'}
 ],
 onRender:()=>{
   const box = document.getElementById('saveBox3');
   document.getElementById('btnExport3').onclick = ()=>{
     box.value = btoa(unescape(encodeURIComponent(JSON.stringify(state))));
     box.select();
   };
   document.getElementById('btnImport3').onclick = ()=>{
     try{
       const sv = JSON.parse(decodeURIComponent(escape(atob(box.value.trim()))));
       if(typeof sv.version !== 'number') throw 0;
       state = Object.assign(freshState(), sv);
       save();
       box.value = 'Save imported ✓';
     }catch(e){ box.value = 'That code did not work. Check it and try again.'; }
   };
 }
},

/* =====================================================
   EPISODE 4 — LEVEL UP
   ===================================================== */

e4s1:{
 onEnter:()=>{ state.episode = 4; snapshotEpisode(4); state.level = 5; grant('level_five'); },
 html:()=>`
  <p class="quiet">EPISODE 4 — LEVEL UP</p>
  <p>Two weeks pass, and they are good weeks.</p>
  <p>The daily quests roll on. A new street, a new lunch, a new thirty minutes — the points climb past three hundred, past four. The question about the locked record still sits in the back of your mind, but it sits quietly, like a stone in a pocket. You carry it. You live around it.</p>
  <p>Then, late on a Friday night, the panel does something it has never done.</p>
  ${sysBox('⬆️ LEVEL 5','520 points reached',[
    ['flair','Major '+vb('update','update')+' available.'],
    ['flair','Restart the panel?']
  ])}
  <p>Restart? The panel has always just… been there. You did not know it could turn off.</p>
  <p>You think the word. "Restart."</p>
  <p>And the whole thing goes dark.</p>`,
 choices:[ {t:'Wait in the dark', go:'e4s2'} ]
},

e4s2:{
 html:()=>`
  <p>For three full seconds there is nothing. No panel, no green, no quests. Just your dark bedroom ceiling, the way it looked for five years before any of this.</p>
  <p>Then it comes back — and it comes back <i>bigger.</i></p>
  <p>The new panel is wider, brighter, sharper. There are fields you have never seen. And one of them is moving, a soft bar filling itself to the top.</p>
  ${sysBox('🆕 PANEL v5.0','Now showing:',[
    ['flair','▸ '+vb('Stamina','stamina')+' — your energy for the day'],
    ['flair','▸ Full city map'],
    ['flair','▸ New quest type: CHAIN']
  ])}
  <p>The system adds, almost as an afterthought:</p>
  ${sysBox('💬 SYSTEM','One note.',[
    ['flair',"You're not the person who got "+vb('winded','winded')+' on the stairs three weeks ago.']
  ])}
  <p>You think about those eleven flights of stairs you climbed a few weeks ago, how your legs complained all afternoon. You climbed stairs yesterday without even noticing. Huh.</p>`,
 choices:[ {t:'Open the new map', go:'e4s3'} ]
},

e4s3:{
 html:()=>`
  <p>The map unfolds — and you actually sit up in bed.</p>
  <p>It is the whole city. All of Kaohsiung, lit and open: the harbor, the mountain, the long coast, Cijin like a finger of land holding the bay. Three weeks ago this map was a fingernail. Now it is everything.</p>
  <p>Almost everything.</p>
  <p>Far to the south, one small patch of fog refuses to lift. And inside it, that same gold light, patient as the first night you saw it.</p>
  <p>You tap it, the way you always do.</p>
  ${sysBox('❓ ???','[ Locked ]',[
    ['flair','Level required: ???'],
    ['flair','Closer.']
  ],'gold')}
  <p class="beat">Closer.</p>
  <p>That word is new. In three weeks of tapping that gold point, the system has never said anything but the locked message. Tonight it added one word.</p>
  <p>You are getting closer to it. By leveling up, you realize, you are walking toward that gold light — one quest at a time.</p>`,
 choices:[ {t:'Sleep. Big day tomorrow somehow.', go:'e4s4'} ]
},

e4s4:{
 html:()=>`
  <p>You do not know why tomorrow feels big. The system has not said anything. But you sleep the way you used to sleep before exams as a kid — that thin, electric sleep, half excitement, half waiting.</p>
  <p>Saturday morning, you find out why.</p>
  ${sysBox('🔗 QUEST CHAIN','THE CITY RUN',[
    ['flair','5 '+vb('links','link')+'. One day. Sunset '+vb('deadline','deadline')+'.'],
    ['flair','Each link unlocks the next.'],
    ['flair','Miss one, the '+vb('chain','chain')+' breaks.'],
    ['pts','+100 + ???']
  ])}
  <p>A chain. Five links, and you can only see the first one — the rest are locked boxes, waiting. One day to do all five. Sunset to finish.</p>
  <p>Your stamina bar is full. The whole city is open. For the first time, all of Kaohsiung is yours to move through.</p>
  <p>The first link appears.</p>`,
 onEnter:()=>{ state.flags.chain_perfect = true; },
 choices:[ {t:'Read link one', go:'e4s5'} ]
},

e4s5:{
 html:()=>`
  ${sysBox('🔗 LINK 1 of 5','Lotus Pond, Zuoying',[
    ['flair','Find the mark at the Dragon and Tiger '+vb('Pagodas','pagoda')+'.'],
    ['flair','Each link hides its clue in how the place itself works.'],
    ['flair','Read the place, and the mark appears. Guess, and you lose time.']
  ])}
  <p>So that is the rule of the chain: every link is a place, and every place is a small test. <i>Read it right, and the mark shows itself. Read it wrong, and you waste minutes you may need before sunset.</i></p>
  <p>You take the train north as the city wakes up. By the time you reach the Lotus Pond, the morning light is doing something golden to the water, and the two towers — the Dragon and Tiger ${vb('Pagodas','pagoda')} — stand out over the green, bright and curling, waiting.</p>`,
 onEnter:()=>{ state.flags.chain_perfect = true; },
 choices:[ {t:'Go to the pagodas', go:'e4s6'} ]
},

e4s6:{
 html:()=>`
  <p>You walk the bridge toward the towers, looking for a mark. Nothing on the railings. Nothing on the steps. Just the two great open mouths — the Dragon's and the Tiger's — each one a doorway in, each one a doorway out.</p>
  <p>A small worn sign stands where the path splits, the kind of sign nobody reads. You read it.</p>
  ${sysBox('🐉 THE OLD WAY','carved into the stone',[['flair','"'+vb('Purge','purge')+' your '+vb('ails','ails')+' in the '+vb('jaws','jaws')+' of '+vb('scales','scales')+';'],['flair',vb('Return','return_to')+' to light, '+vb('reborn','reborn')+' through '+vb('stripes','stripes')+'."']])}
  <p>The Tiger's mouth is right in front of you, closer, easier; a tiger is the fierce one, the guardian, surely a fine way to start. The Dragon's mouth is a few steps further along the bridge. You have to pick one to enter.</p>`,
 choices:[
   {t:'Enter the Dragon\u2019s mouth.', go:'e4s6_dragon'},
   {t:'Enter the Tiger\u2019s mouth.', go:'e4s6_tiger'}
 ]
},

e4s6_dragon:{
 html:()=>`
  <p>You walk the extra steps to the Dragon's mouth and enter there.</p>
  <p>The moment your foot crosses into the Dragon's mouth, the green mark blooms on the inner wall, bright and sure. You walk the curving path through the belly of the tower and out through the Tiger's mouth, the way the city has done it for a hundred years, and the system pings — warm, approving.</p>
  ${sysBox('✅ LINK 1 COMPLETE','Read correctly',[
    ['flair',vb('Stamina','stamina')+' \u221210 \u00b7 +15 (you feel good)'],
    ['flair','Clean. Link 2 unlocked.']
  ])}
  <p>The chain's lesson lands: the marks are not random. They hide in the way each place already works. Read the place, find the mark.</p>`,
 onEnter:()=>{ state.stamina = 105; },
 choices:[ {t:'A second mark?', go:'e4s7'} ]
},

e4s6_tiger:{
 onEnter:()=>{ state.flags.chain_perfect = false; },
 html:()=>`
  <p>The Tiger is closer, so you duck in there — and a small green glow flickers deep inside, then <i>fades,</i> like the system is shaking its head.</p>
  <p>Wrong way. The sign told you: the dragon takes you <i>in.</i> You entered through the tiger and ran the whole thing backward. The mark will not show itself to someone who walks against the old order.</p>
  ${sysBox('\u26a0 STUMBLE','You read the place wrong.',[
    ['flair','The chain holds \u2014 but a clean run is no longer possible.'],
    ['flair','Walk back. Enter through the Dragon, the right way.']
  ],'fail')}
  <p>You backtrack, losing a few minutes you may want later, and enter the Dragon's mouth properly. This time the mark blooms at once.</p>`,
 choices:[ {t:'A second mark?', go:'e4s7' } ]
},

e4s7:{
 html:()=>`
  <p>With link one done, the system murmurs something extra — quieter, optional.</p>
  ${sysBox('\u2728 BONUS MARK','Somewhere around the pond',[
    ['flair','A hidden mark waits nearby. Find it for a '+vb('stamina','stamina')+' boost.'],
    ['flair','But it will cost you time. The day is long; the sun still moves.']
  ])}
  <p>A choice. It is still early, and your legs are fresh, but the chain has a sunset at the end of it. Spend five, ten minutes hunting a bonus now to bank some energy — or save the time and trust your legs to last?</p>`,
 choices:[
   {t:'Hunt the bonus mark. Bank some energy.', go:'e4s7_bonus'},
   {t:'Skip it. Keep your time.', go:'e4s8'}
 ]
},

e4s7_bonus:{
 onEnter:()=>{ state.stamina = Math.min(130, state.stamina + 20); state.flags.e4_banked = true; },
 html:()=>`
  <p>You circle the pond, reading the place the way the towers taught you, and find the bonus mark tucked behind a stone lion that has watched the water for longer than anyone remembers. The system pings, pleased.</p>
  ${sysBox('\u2728 BONUS FOUND','Stamina banked',[
    ['flair',vb('Stamina','stamina')+' +20 \u00b7 you have a buffer now'],
    ['flair','Time spent: about ten minutes.']
  ])}
  <p>Ten minutes gone, but your legs have a cushion for whatever the day throws at them. You hope it was the right call. You will find out.</p>`,
 choices:[ {t:'On to link two', go:'e4s8'} ]
},

e4s8:{
 html:()=>`
  ${sysBox('\ud83d\udd17 LINK 2 of 5','Cijin \u2014 the old fort',[
    ['flair','The mark is on the island. Sunset is moving.'],
    ['flair','Get yourself to the Gushan ferry. How is up to you.']
  ])}
  <p>The mark for link two is across the water, on Cijin. First you have to get from the Lotus Pond down to the Gushan ferry pier — a real distance, and the day's clock is already ticking.</p>
  <p>Three ways to make the trip. You weigh them in your head:</p>
  ${sysBox('\ud83d\ude95 YOUR OPTIONS','Time \u00b7 money \u00b7 risk',[
    ['flair','TAXI \u2014 about 20 min if the roads are clear. Costs the most. Could hit traffic.'],
    ['flair','BUS \u2014 about 35 min, if one comes soon. Cheap. Steady.'],
    ['flair','MRT + shared bike \u2014 about 48 min. Cheapest. No surprises.']
  ])}`,
 choices:[
   {t:'Taxi. Gamble on a clear road.', go:'e4s8_taxi'},
   {t:'Bus. The middle path.', go:'e4s8_bus'},
   {t:'MRT and a YouBike. Slow and sure.', go:'e4s8_mrt'}
 ]
},

e4s8_taxi:{
 onEnter:()=>{ state.money -= 250; state.flags.e4_time = 'fast'; },
 html:()=>`
  <p>You flag a taxi. The driver knows the back roads, the meter ticks up, and the harbor slides past the window. Twenty minutes, clean — the gamble pays off, no traffic today. It cost you a few hundred dollars you will feel later, but you are at the ferry pier with the most precious thing of all in your pocket: <i>time.</i></p>
  <p>The boat is loading.</p>`,
 choices:[ {t:'Board the ferry', go:'e4s9'} ]
},

e4s8_bus:{
 onEnter:()=>{ state.flags.e4_time = 'mid'; },
 html:()=>`
  <p>The bus comes within a few minutes — lucky — and you settle by the window for the ride south. Thirty-five minutes, steady and cheap, the city rolling by in no particular hurry. Not the fastest, not the slowest. A fair trade.</p>
  <p>You reach the pier with enough time, if not a lot of it. The boat is loading.</p>`,
 choices:[ {t:'Board the ferry', go:'e4s9'} ]
},

e4s8_mrt:{
 onEnter:()=>{ state.stamina = Math.max(10, state.stamina - 8); state.flags.e4_time = 'slow'; },
 html:()=>`
  <p>You take the sure thing: a shared bike from the Lotus Pond to the nearest MRT station, then the train south, then a short walk from the station to the ferry pier. Forty-eight minutes, the cheapest way, and not a single surprise — but the clock has moved more than you would like, and your legs did some of the work the engine could have done.</p>
  <p>You reach the pier. The boat is loading.</p>`,
 choices:[ {t:'Board the ferry', go:'e4s9'} ]
},

e4s9:{
 html:()=>`
  <p>This is not the slow crossing from before. No standing at the rail watching the foam. The ferry has barely touched the Cijin ${vb('gate','gate')} before you are moving, the chain pulling you forward.</p>
